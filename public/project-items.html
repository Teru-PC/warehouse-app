<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>案件機材割当</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    body { padding: 12px; background: #f5f5f5; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .card { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 14px; margin: 10px 0; }
    .btn { padding: 10px 16px; font-size: 15px; border-radius: 8px; cursor: pointer; border: 1px solid #ccc; background: #fff; }
    .btn-primary { background: #3b82f6; color: #fff; border-color: #2563eb; font-weight: bold; }
    .btn-primary:disabled { background: #93c5fd; border-color: #93c5fd; cursor: not-allowed; }
    .btn-danger { background: #ef4444; color: #fff; border-color: #dc2626; }
    .btn-sm { padding: 5px 10px; font-size: 13px; border-radius: 6px; }

    /* 割当済み一覧 */
    .assigned-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 8px; border-bottom: 1px solid #eee;
    }
    .assigned-item:last-child { border-bottom: none; }
    .assigned-item img { width: 48px; height: 48px; object-fit: cover; border-radius: 6px; background: #eee; }
    .assigned-item .no-img { width: 48px; height: 48px; border-radius: 6px; background: #e5e7eb; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #9ca3af; }
    .assigned-item .info { flex: 1; }
    .assigned-item .name { font-weight: bold; font-size: 15px; }
    .assigned-item .qty-row { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
    .assigned-item input[type=number] { width: 70px; padding: 4px 6px; font-size: 14px; border: 1px solid #ccc; border-radius: 6px; }
    .assigned-item .actions { display: flex; gap: 6px; }

    /* 機材選択リスト */
    .equip-section-header {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 6px; background: #f3f4f6; border-radius: 8px;
      margin: 10px 0 4px; font-weight: bold; font-size: 14px; color: #6b7280;
    }
    .equip-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 8px; border-bottom: 1px solid #eee; cursor: pointer;
      transition: background 0.1s;
    }
    .equip-item:hover { background: #f0f9ff; }
    .equip-item:last-child { border-bottom: none; }
    .equip-item input[type=checkbox] { width: 22px; height: 22px; cursor: pointer; accent-color: #3b82f6; }
    .equip-item img { width: 52px; height: 52px; object-fit: cover; border-radius: 8px; background: #eee; }
    .equip-item .no-img { width: 52px; height: 52px; border-radius: 8px; background: #e5e7eb; display: flex; align-items: center; justify-content: center; font-size: 22px; color: #9ca3af; }
    .equip-item .info { flex: 1; }
    .equip-item .name { font-weight: bold; font-size: 15px; }
    .equip-item .stock { font-size: 13px; color: #6b7280; margin-top: 2px; }
    .equip-item .qty-wrap { display: flex; align-items: center; gap: 4px; }
    .equip-item input[type=number] { width: 64px; padding: 5px 6px; font-size: 14px; border: 1px solid #ccc; border-radius: 6px; }
    .equip-item.checked { background: #eff6ff; }

    .add-bar { display: flex; justify-content: flex-end; margin-top: 12px; }
    #addMsg { margin-top: 8px; color: #16a34a; font-weight: bold; }
    #errorMsg { margin-top: 8px; color: #dc2626; font-weight: bold; }

    .search-wrap { margin-bottom: 10px; }
    .search-wrap input { width: 100%; padding: 8px 12px; font-size: 15px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
  </style>
</head>
<body>
  <div class="row" style="justify-content:space-between; margin-bottom:6px">
    <h2 style="margin:0">案件機材割当</h2>
    <button class="btn" id="backBtn">戻る</button>
    <button class="btn" onclick="location.href='/calendar.html'">📅 カレンダー</button>
    <button class="btn" onclick="location.href='/shipping-calendar.html'">📦 発送確認</button>
  </div>

  <!-- 案件情報 -->
  <div class="card" id="projectInfo">読み込み中...</div>

  <!-- 割当済み一覧 -->
  <div class="card">
    <h3 style="margin-top:0">割当済み一覧</h3>
    <div id="itemsWrap">読み込み中...</div>
  </div>

  <!-- 機材を追加 -->
  <div class="card">
    <h3 style="margin-top:0">機材を追加</h3>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="機材名で検索..." />
    </div>
    <div id="equipList">読み込み中...</div>
    <div id="addMsg"></div>
    <div id="errorMsg"></div>
    <div class="add-bar">
      <button class="btn btn-primary" id="addBtn">チェックした機材を追加</button>
    </div>
  </div>

  <script src="/js/project-items.js"></script>
</body>
</html>
