<!doctype html>
<html lang="ja">
<head>
  <script src="/js/auth.js"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
  <title>カレンダー</title>
  <link rel="icon" href="data:," />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; overflow: hidden; height: 100vh; }

    .cal-nav-btn {
      width: 96px; height: 34px;
      padding: 0 6px;
      border: 1px solid #e5e7eb; background: #fff;
      border-radius: 10px; cursor: pointer;
      font-weight: 700; font-size: 12px;
      white-space: nowrap; overflow: hidden;
      text-align: center; display: inline-flex;
      align-items: center; justify-content: center;
      text-decoration: none; box-sizing: border-box;
    }
    .cal-error { color: #b91c1c; font-size: 12px; }

    /* 最上部固定ナビ */
    #navBar {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 300; background: #fff;
      border-bottom: 1px solid #e5e7eb;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .cal-nav-row {
      display: flex;
      align-items: center; padding: 6px 12px; gap: 8px;
    }
    #prevBtn { flex-shrink: 0; }
    #nextBtn { flex-shrink: 0; margin-left: auto; }
    .cal-nav-left {
      display: flex; flex-direction: column; gap: 3px;
      align-items: flex-start; flex-shrink: 0;
    }
    .cal-nav-btn-small {
      width: 70px; padding: 3px 4px;
      border: 1px solid #e5e7eb; background: #f9fafb;
      border-radius: 8px; cursor: pointer;
      font-weight: 700; font-size: 10px;
      text-decoration: none; text-align: center;
      display: block; color: #374151; line-height: 1.6;
    }
    .cal-nav-btn-small:hover { background: #f3f4f6; }
    .cal-nav-mid {
      flex: 1; display: flex;
      gap: 8px; align-items: center; justify-content: center;
    }
    .cal-controls {
      display: flex; justify-content: center;
      align-items: center; gap: 6px; padding: 4px 12px;
    }
    .cal-mode-btn {
      border: 1px solid #e5e7eb; background: #fff;
      font-weight: 600; font-size: 12px;
      padding: 5px 10px; border-radius: 8px; cursor: pointer;
    }
    .cal-mode-btn.is-active { background: #2563eb; color: #fff; border-color: #2563eb; }
    .cal-date {
      padding: 5px 8px; border: 1px solid #e5e7eb;
      border-radius: 8px; font-size: 12px;
    }

    /* 日付ヘッダー固定バー */
    #dateHeaderBar {
      position: fixed; left: 0; right: 0;
      z-index: 200; background: #fff;
      border-bottom: 2px solid #e5e7eb;
      display: flex;
    }
    #dateHeaderCorner {
      flex-shrink: 0; background: #fff;
      border-right: 1px solid #e5e7eb;
      position: relative;
    }
    /* 折りたたみトグルボタン */
    #alldayToggleBtn {
      position: absolute; bottom: 4px; left: 50%;
      transform: translateX(-50%);
      width: 28px; height: 28px;
      background: #f1f5f9; border: 1px solid #cbd5e1;
      border-radius: 50%; cursor: pointer;
      font-size: 12px; display: flex;
      align-items: center; justify-content: center;
      z-index: 10; transition: background 0.2s;
      user-select: none;
    }
    #alldayToggleBtn:hover { background: #e2e8f0; }
    /* 折りたたみ状態 */
    #dateHeaderBar.allday-collapsed .cal-ship-btn-area {
      overflow: hidden;
      min-height: 0 !important;
      height: 0 !important;
      padding: 0 !important;
    }
    #dateHeaderBar.allday-collapsed .cal-allday-item {
      display: none;
    }
    #dateHeaderBar.allday-collapsed .cal-day-head {
      padding-bottom: 4px;
    }
    #dateHeaderScroll { flex: 1; overflow: hidden; }
    #daysHeader { display: grid; grid-auto-flow: column; }
    .cal-day-head {
      padding: 6px 8px; border-left: 1px solid #e5e7eb;
      font-weight: 700; font-size: 13px; white-space: nowrap;
    }
    .cal-day-head.is-sat { background: #eaf3ff; }
    .cal-day-head.is-sun { background: #ffecec; }
    .cal-ship-btn-area {
      display: flex; flex-direction: column; gap: 2px; padding: 2px 4px;
      transition: height 0.2s, min-height 0.2s;
    }
    .cal-ship-btn {
      display: block; width: 100%;
      background: #fecaca; border: 1px solid #f87171;
      border-radius: 8px; font-size: 10px; font-weight: 700;
      color: #7f1d1d; padding: 3px 6px; cursor: pointer;
      text-align: left; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; line-height: 22px; height: 28px;
    }
    .cal-ship-btn:hover { background: #fca5a5; }

    /* メインエリア：時間列 + グリッドスクロール */
    #mainArea {
      display: flex;
      overflow: hidden;
    }

    /* 時間列：縦スクロールのみ、横は固定 */
    #timeCol {
      flex-shrink: 0;
      width: 72px;
      overflow: hidden;
      background: #fff;
      border-right: 1px solid #e5e7eb;
      z-index: 10;
    }
    .cal-time-slot {
      display: flex; align-items: flex-start;
      justify-content: flex-end;
      padding-right: 8px; padding-top: 2px;
      font-size: 11px; color: #6b7280;
    }
    .cal-time-slot.is-hour { font-weight: 700; color: #111827; font-size: 12px; }

    /* グリッドスクロール：縦横両方スクロール */
    #gridScroll {
      flex: 1;
      overflow-x: auto;
      overflow-y: auto;
    }
    #daysGrid { display: grid; grid-auto-flow: column; }
    .cal-day-col {
      position: relative;
      border-left: 1px solid #e5e7eb;
    }
    .cal-day-col.is-sat { background: #f6fbff; }
    .cal-day-col.is-sun { background: #fff7f7; }
    .cal-slot-line { position: relative; }
    .cal-slot-line::before {
      content: ""; position: absolute; left: 0; right: 0; top: 0;
      border-top: 1px dashed #e5e7eb;
    }
    .cal-slot-line.hour::before { border-top: 2px solid #9ca3af; }

    .cal-project {
      position: absolute; border-radius: 6px; padding: 4px 6px;
      font-size: 12px; font-weight: 700; cursor: pointer;
      color: #111827; overflow: hidden; box-sizing: border-box;
    }
    .cal-project.draft { background: #93c5fd; }
    .cal-project.confirmed { background: #86efac; }
    .cal-project.cancelled { background: #fca5a5; }
    .cal-project.cal-project--shortage { box-shadow: 0 0 0 3px #dc2626 inset; }
    .cal-project.cal-color--1{ background:#fecaca; }
    .cal-project.cal-color--2{ background:#fed7aa; }
    .cal-project.cal-color--3{ background:#fef3c7; }
    .cal-project.cal-color--4{ background:#d9f99d; }
    .cal-project.cal-color--5{ background:#bbf7d0; }
    .cal-project.cal-color--6{ background:#a7f3d0; }
    .cal-project.cal-color--7{ background:#99f6e4; }
    .cal-project.cal-color--8{ background:#a5f3fc; }
    .cal-project.cal-color--9{ background:#bae6fd; }
    .cal-project.cal-color--10{ background:#c7d2fe; }
    .cal-project.cal-color--11{ background:#e9d5ff; }
    .cal-project.cal-color--12{ background:#fbcfe8; }

    /* ===== スマホ対応 ===== */
    #hamburgerBtn {
      display: none;
      background: none; border: none;
      font-size: 22px; cursor: pointer;
      padding: 4px 8px; flex-shrink: 0;
    }
    #mobileMenu {
      display: none;
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5); z-index: 500;
    }
    #mobileMenu.open { display: block; }
    #mobileMenuInner {
      position: absolute; top: 0; left: 0;
      width: 240px; height: 100%;
      background: #fff;
      padding: 16px 12px;
      display: flex; flex-direction: column; gap: 10px;
      box-shadow: 4px 0 16px rgba(0,0,0,0.15);
    }
    #mobileMenuClose {
      align-self: flex-end; background: none; border: none;
      font-size: 22px; cursor: pointer; color: #374151;
    }
    .mobile-menu-btn {
      display: block; width: 100%;
      padding: 10px 14px; border-radius: 10px;
      border: 1px solid #e5e7eb; background: #f9fafb;
      font-size: 14px; font-weight: 700;
      text-decoration: none; color: #111827;
      text-align: left; cursor: pointer;
    }
    .mobile-menu-btn:hover { background: #f3f4f6; }
    @media (max-width: 900px) {
      #hamburgerBtn { display: block; }
      .cal-nav-left { display: none; }
      .cal-nav-mid { display: none; }
      #prevBtn, #nextBtn { font-size: 11px; padding: 5px 8px; }
    }
  </style>
</head>
<body>

  <!-- スマホ ハンバーガーメニュー -->
  <div id="mobileMenu">
    <div id="mobileMenuInner">
      <button id="mobileMenuClose">✕</button>
      <button class="mobile-menu-btn" id="mobileNewBtn">📝 新規作成</button>
      <a class="mobile-menu-btn" href="/equipment.html">🔧 機材管理</a>
      <a class="mobile-menu-btn" href="/shipping-calendar.html" style="background:#e0f7fa;color:#006064;border-color:#4dd0e1;">🚚 発送確認</a>
      <a class="mobile-menu-btn" href="/staff-calendar.html" style="background:#e8f5e9;color:#1b5e20;border-color:#a5d6a7;">👤 通訳</a>
      <button class="mobile-menu-btn" id="mobileGcalBtn" style="background:#fff3e0;color:#e65100;border-color:#ffb74d;">📅 Google連携</button>
      <a class="mobile-menu-btn" href="/trash.html" style="background:#fee2e2;color:#b91c1c;border-color:#fca5a5;">🗑️ ゴミ箱</a>
    </div>
  </div>

  <div id="navBar">
    <div class="cal-nav-row">
      <button class="cal-nav-btn" id="prevBtn" type="button">戻る</button>
      <button id="hamburgerBtn">☰</button>
      <div class="cal-nav-left">
        <button class="cal-nav-btn-small" id="newBtn" type="button">新規作成</button>
        <a class="cal-nav-btn-small" href="/equipment.html">機材管理</a>
      </div>
      <div class="cal-nav-mid">
        <a class="cal-nav-btn" href="/shipping-calendar.html" style="text-decoration:none;text-align:center;background:#e0f7fa;color:#006064;border-color:#4dd0e1;">🚚 発送確認</a>
        <a class="cal-nav-btn" href="/staff-calendar.html" style="text-decoration:none;text-align:center;background:#e8f5e9;color:#1b5e20;border-color:#a5d6a7;">👤 通訳</a>
        <button class="cal-nav-btn" id="gcalBtn" style="background:#fff3e0;color:#e65100;border-color:#ffb74d;">📅 Google連携</button>
        <a class="cal-nav-btn" href="/trash.html" style="text-decoration:none;text-align:center;background:#fee2e2;color:#b91c1c;border-color:#fca5a5;">🗑️ ゴミ箱</a>
        <span class="cal-error" id="errorText"></span>
      </div>
      <button class="cal-nav-btn" id="nextBtn" type="button">進む</button>
    </div>
    <div class="cal-controls">
      <button class="cal-mode-btn" id="modeDay"   type="button">日</button>
      <button class="cal-mode-btn" id="modeWeek"  type="button">週</button>
      <button class="cal-mode-btn" id="mode2Week" type="button">2週</button>
      <button class="cal-mode-btn" id="modeMonth" type="button">月</button>
      <input type="date" class="cal-date" id="datePicker" />
    </div>
  </div>

  <div id="dateHeaderBar">
    <div id="dateHeaderCorner">
      <button id="alldayToggleBtn" title="時間未定エリアを開閉">▶</button>
    </div>
    <div id="dateHeaderScroll">
      <div id="daysHeader"></div>
    </div>
  </div>

  <div id="mainArea">
    <div id="timeCol"></div>
    <div id="gridScroll">
      <div id="daysGrid"></div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/calendar.js"></script>
  <script>
    // ハンバーガーメニュー
    (function() {
      const menu = document.getElementById('mobileMenu');
      const openBtn = document.getElementById('hamburgerBtn');
      const closeBtn = document.getElementById('mobileMenuClose');
      openBtn.addEventListener('click', () => menu.classList.add('open'));
      closeBtn.addEventListener('click', () => menu.classList.remove('open'));
      menu.addEventListener('click', (e) => { if (e.target === menu) menu.classList.remove('open'); });
      // モバイルの新規作成・Google連携ボタン
      const mobileNewBtn = document.getElementById('mobileNewBtn');
      if (mobileNewBtn) mobileNewBtn.addEventListener('click', () => {
        const ret = encodeURIComponent(location.pathname + location.search);
        location.href = '/project-new.html?return=' + ret;
      });
      const mobileGcalBtn = document.getElementById('mobileGcalBtn');
      if (mobileGcalBtn) mobileGcalBtn.addEventListener('click', () => {
        document.getElementById('gcalBtn') && document.getElementById('gcalBtn').click();
        menu.classList.remove('open');
      });
    })();
    // 時間未定エリア 折りたたみ機能
    (function() {
      const bar = document.getElementById('dateHeaderBar');
      const btn = document.getElementById('alldayToggleBtn');
      // 最初は閉じた状態
      bar.classList.add('allday-collapsed');
      btn.textContent = '▶';

      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        const isCollapsed = bar.classList.toggle('allday-collapsed');
        btn.textContent = isCollapsed ? '▶' : '▼';
        // レイアウト再計算
        setTimeout(function() {
          window.dispatchEvent(new Event('resize'));
        }, 220);
      });
    })();
  </script>
  <script>
    const user = window.authUtils ? window.authUtils.getUser() : null;


    // Googleカレンダー連携
document.getElementById('gcalBtn').addEventListener('click', async () => {
  const token = localStorage.getItem('token') || '';
  const statusRes = await fetch('/api/google/status', {
    headers: { Authorization: `Bearer ${token}` }
  });
  const status = await statusRes.json();

  if (!status.connected) {
    // 未連携の場合は認証画面を開く
    const authRes = await fetch('/api/auth/google', {
      headers: { Authorization: `Bearer ${token}` }
    });
    const { url } = await authRes.json();
    const popup = window.open(url, 'google-auth', 'width=500,height=600');
    window.addEventListener('message', async (e) => {
      if (e.data === 'google-auth-success') {
        popup.close();
        await runImport(token);
      }
    }, { once: true });
  } else {
    await runImport(token);
  }
});

async function runImport(token) {
  const btn = document.getElementById('gcalBtn');
  btn.textContent = '⏳ インポート中...';
  btn.disabled = true;
  try {
    const res = await fetch('/api/google/import', {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}` }
    });
    const data = await res.json();
    alert(`インポート完了！ ${data.imported}件の案件を追加しました`);
    location.reload();
  } catch (e) {
    alert('インポートに失敗しました: ' + e.message);
  } finally {
    btn.textContent = '📅 Gカレンダー連携';
    btn.disabled = false;
  }
}
  </script>

  <script>
    // ピンチズーム（時間列・日付ヘッダー・グリッドを同時スケール）
    (function() {
      const gridScroll   = document.getElementById('gridScroll');
      const timeCol      = document.getElementById('timeCol');
      const headerScroll = document.getElementById('dateHeaderScroll');
      if (!gridScroll) return;

      let currentScale = 1.0;
      const MIN_SCALE  = 0.3;
      const MAX_SCALE  = 2.0;
      let lastDist     = null;
      let pinching     = false;

      function getDist(touches) {
        const dx = touches[0].clientX - touches[1].clientX;
        const dy = touches[0].clientY - touches[1].clientY;
        return Math.sqrt(dx * dx + dy * dy);
      }

      function applyScale(scale) {
        currentScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, scale));

        // グリッド（縦横スケール）
        const daysGrid = document.getElementById('daysGrid');
        if (daysGrid) {
          daysGrid.style.transformOrigin = 'top left';
          daysGrid.style.transform = `scale(${currentScale})`;
          daysGrid.style.width  = `${100 / currentScale}%`;
          daysGrid.style.height = `${100 / currentScale}%`;
        }

        // 時間列（縦のみスケール）
        if (timeCol) {
          timeCol.style.transformOrigin = 'top left';
          timeCol.style.transform = `scaleY(${currentScale})`;
          timeCol.style.height = `${100 / currentScale}%`;
        }

        // 日付ヘッダー（横のみスケール）
        const daysHeader = document.getElementById('daysHeader');
        if (daysHeader) {
          daysHeader.style.transformOrigin = 'top left';
          daysHeader.style.transform = `scaleX(${currentScale})`;
          daysHeader.style.width = `${100 / currentScale}%`;
        }
      }

      gridScroll.addEventListener('touchstart', function(e) {
        if (e.touches.length === 2) {
          pinching = true;
          lastDist = getDist(e.touches);
          e.preventDefault();
        }
      }, { passive: false });

      gridScroll.addEventListener('touchmove', function(e) {
        if (!pinching || e.touches.length !== 2) return;
        e.preventDefault();
        const dist = getDist(e.touches);
        if (lastDist === null) { lastDist = dist; return; }
        const ratio = dist / lastDist;
        lastDist = dist;
        applyScale(currentScale * ratio);
      }, { passive: false });

      gridScroll.addEventListener('touchend', function(e) {
        if (e.touches.length < 2) {
          pinching  = false;
          lastDist  = null;
        }
      }, { passive: true });
    })();
  </script>

</body>
</html>
