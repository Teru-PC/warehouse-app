<!doctype html>
<html lang="ja">
<head>
  <script src="/js/auth.js"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>カレンダー</title>
  <link rel="stylesheet" href="/css/calendar.css" />
  <style>
    .cal-header-fixed {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .cal-nav-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 6px 12px;
    }
    .cal-controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      flex-wrap: wrap;
    }
    .cal-mode-btn {
      border: 1px solid #e5e7eb;
      background: #fff;
      font-weight: 600;
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 8px;
      cursor: pointer;
    }
    .cal-mode-btn.is-active { background: #2563eb; color: #fff; border-color: #2563eb; }
    .cal-date {
      padding: 5px 8px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 12px;
    }
    .cal-nav-btn {
      width: 88px;
      padding: 6px;
      border: 1px solid #e5e7eb;
      background: #fff;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      font-size: 12px;
    }
    #prevBtn { justify-self: start; }
    #nextBtn { justify-self: end; }
    .cal-nav-mid {
      justify-self: center;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .cal-error { color: #b91c1c; min-height: 18px; font-size: 12px; }
    .cal-topbar-spacer { height: 88px; }
  </style>
</head>
<body>

  <div class="cal-header-fixed">
    <div class="cal-nav-row">
      <button class="cal-nav-btn" id="prevBtn">戻る</button>
      <div class="cal-nav-mid">
        <button class="cal-nav-btn" id="newBtn">新規作成</button>
        <a class="cal-nav-btn" href="/equipment.html" style="text-decoration:none; text-align:center; line-height:1.4;">機材管理</a>
        <p class="cal-error" id="errorText"></p>
      </div>
      <button class="cal-nav-btn" id="nextBtn">進む</button>
    </div>
    <div class="cal-controls">
      <button class="cal-mode-btn" data-mode="day"   id="modeDay">日</button>
      <button class="cal-mode-btn" data-mode="week"  id="modeWeek">週</button>
      <button class="cal-mode-btn" data-mode="2week" id="mode2Week">2週</button>
      <button class="cal-mode-btn" data-mode="month" id="modeMonth">月</button>
      <input type="date" class="cal-date" id="datePicker" />
    </div>
  </div>

  <div class="cal-topbar-spacer"></div>

  <div id="gridRoot">
    <div class="cal-scroll-body">
      <div class="cal-time-col" id="timeCol">
        <div class="cal-time-corner"></div>
      </div>
      <div style="flex:1; min-width:0;">
        <div class="cal-days-header" id="daysHeader"></div>
        <div class="cal-days-grid" id="daysGrid"></div>
      </div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/calendar.js"></script>
  <script>
    const user = window.authUtils ? window.authUtils.getUser() : null;
  </script>
</body>
</html>
