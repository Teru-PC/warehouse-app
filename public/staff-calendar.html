<!doctype html>
<html lang="ja">
<head>
  <script src="/js/auth.js"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>通訳カレンダー</title>
  <link rel="icon" href="data:," />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f8fafc; color: #111827; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    #pageWrap { display: flex; flex: 1; overflow: hidden; }

    #navBar {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      padding: 6px 16px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
      z-index: 100;
      gap: 8px;
    }
    .nav-btn {
      padding: 4px 10px;
      border: 1px solid #e5e7eb;
      background: #fff;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      white-space: nowrap;
    }
    .nav-btn:hover { background: #f3f4f6; }
    #errorText { color: #b91c1c; font-size: 12px; }
    #rangeLabel { font-size: 13px; font-weight: 600; color: #374151; min-width: 200px; text-align: center; }

    #zoomControls {
      display: flex; align-items: center; gap: 4px; margin-left: 4px;
    }
    #zoomControls button {
      padding: 2px 8px; border: 1px solid #e5e7eb; background: #fff;
      border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 700; line-height: 1.4;
    }
    #zoomControls button:hover { background: #f3f4f6; }
    #zoomLabel { font-size: 12px; color: #6b7280; min-width: 36px; text-align: center; }

    #mainPane { flex: 1; overflow: auto; }

    #zoomWrapper { transform-origin: top left; }

    #calTable { border-collapse: collapse; white-space: nowrap; }

    #calTable thead th {
      position: sticky; top: 0; background: #fff; z-index: 20;
      border: 1px solid #e5e7eb; font-size: 11px; font-weight: 700;
      padding: 4px 6px; text-align: center; min-width: 80px;
    }
    #calTable thead th.th-staff {
      position: sticky; top: 0; left: 0; z-index: 30;
      min-width: 100px; max-width: 100px; text-align: left; padding-left: 8px;
      background: #fff;
    }
    #calTable thead th.is-sat { background: #eaf3ff; }
    #calTable thead th.is-sun { background: #ffecec; }
    #calTable thead th.is-today { background: #fef9c3; }
    #calTable thead th.sortable { cursor: pointer; user-select: none; }
    #calTable thead th.sortable:hover { background: #f0f9ff; }
    #calTable thead th.sorted { background: #dbeafe !important; }
    #calTable thead th .sort-indicator { font-size: 9px; color: #3b82f6; margin-left: 2px; }

    #calTable tbody td.td-staff {
      position: sticky; left: 0; z-index: 10; background: #fff;
      border: 1px solid #e5e7eb; font-size: 12px; font-weight: 700;
      padding: 4px 8px; min-width: 100px; max-width: 100px;
      overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap;
    }
    #calTable tbody tr.has-sort td.td-staff { background: #eff6ff; }

    #calTable tbody td.td-day {
      border: 1px solid #e5e7eb; padding: 2px;
      min-width: 80px; vertical-align: top;
    }
    #calTable tbody td.is-sat { background: #f6fbff; }
    #calTable tbody td.is-sun { background: #fff7f7; }
    #calTable tbody td.is-today { background: #fefce8; }

    /* イベントブロック */
    .ev-block {
      border-radius: 6px;
      padding: 3px 5px;
      margin: 1px 0;
      cursor: pointer;
      font-size: 10px;
      font-weight: 700;
      line-height: 1.3;
      overflow: hidden;
      user-select: none;
    }
    .ev-block:hover { filter: brightness(0.92); }
    .ev-block .ev-title {
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      font-size: 10px; font-weight: 700;
    }
    .ev-block .ev-time {
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      font-size: 9px; font-weight: 400; opacity: 0.85; margin-top: 1px;
    }
    .ev-block.draft     { background: #bfdbfe; color: #1e3a5f; border: 1px solid #93c5fd; }
    .ev-block.confirmed { background: #bbf7d0; color: #14532d; border: 1px solid #86efac; }
    .ev-block.cancelled { background: #fecaca; color: #7f1d1d; border: 1px solid #fca5a5; }

    #loadingMsg { text-align: center; padding: 40px; color: #6b7280; font-size: 14px; }

    /* 右ペイン */
    #pageWrap { display: flex; flex: 1; overflow: hidden; }
    #mainPane { flex: 1; overflow: auto; }
    #detailPane {
      width: 0; overflow: hidden; transition: width 0.25s ease;
      border-left: 1px solid #e5e7eb; background: #fff;
      display: flex; flex-direction: column; flex-shrink: 0;
    }
    #detailPane.open { width: 360px; }
    #detailInner { padding: 16px; overflow-y: auto; flex: 1; font-size: 13px; }
    #detailInner h3 { font-size: 15px; font-weight: 800; margin-bottom: 12px; color: #1e3a5f; }
    .detail-row { margin-bottom: 8px; line-height: 1.6; }
    .detail-label { font-size: 11px; font-weight: 700; color: #6b7280; }
    .detail-val { color: #111827; }
    #detailMemo {
      margin-top: 12px; padding: 10px; background: #f9fafb;
      border: 1px solid #e5e7eb; border-radius: 8px;
      font-size: 12px; white-space: pre-wrap; line-height: 1.7;
      color: #374151; max-height: 200px; overflow-y: auto;
    }
    #detailClose {
      padding: 8px 16px; border-bottom: 1px solid #e5e7eb;
      display: flex; justify-content: space-between; align-items: center;
      gap: 8px; flex-shrink: 0;
    }
    .close-btn {
      background: none; border: none; cursor: pointer;
      font-size: 18px; color: #6b7280; line-height: 1; flex-shrink: 0;
    }
    .close-btn:hover { color: #111; }
    .detail-actions {
      display: flex; gap: 6px; flex: 1;
    }
    .detail-actions a, .detail-actions button {
      flex: 1; padding: 6px 4px; border-radius: 8px;
      font-size: 11px; font-weight: 700; cursor: pointer;
      text-align: center; text-decoration: none;
      border: 1px solid #e5e7eb;
    }
    .btn-edit { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe !important; }
    .btn-edit:hover { background: #dbeafe; }
    .btn-delete { background: #fff; color: #dc2626; border-color: #fca5a5 !important; }
    .btn-delete:hover { background: #fee2e2; }

    /* ソート中バッジ */
    #sortBadge {
      display: none;
      background: #3b82f6; color: #fff;
      font-size: 11px; font-weight: 700;
      padding: 3px 10px; border-radius: 20px;
      margin-left: 8px; cursor: pointer;
    }
    #sortBadge:hover { background: #2563eb; }

    /* ===== スマホ対応 ===== */
    #hamburgerBtn {
      display: none;
      background: none; border: none;
      font-size: 22px; cursor: pointer;
      padding: 4px 8px; flex-shrink: 0;
    }
    #mobileMenu {
      display: none;
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5); z-index: 500;
    }
    #mobileMenu.open { display: block; }
    #mobileMenuInner {
      position: absolute; top: 0; left: 0;
      width: 240px; height: 100%;
      background: #fff;
      padding: 16px 12px;
      display: flex; flex-direction: column; gap: 10px;
      box-shadow: 4px 0 16px rgba(0,0,0,0.15);
    }
    #mobileMenuClose {
      align-self: flex-end; background: none; border: none;
      font-size: 22px; cursor: pointer; color: #374151;
    }
    .mobile-menu-btn {
      display: block; width: 100%;
      padding: 10px 14px; border-radius: 10px;
      border: 1px solid #e5e7eb; background: #f9fafb;
      font-size: 14px; font-weight: 700;
      text-decoration: none; color: #111827;
      text-align: left; cursor: pointer;
    }
    .mobile-menu-btn:hover { background: #f3f4f6; }
    @media (max-width: 640px) {
      #hamburgerBtn { display: block; }
      #navBar .nav-btn:not(#prevBtn):not(#nextBtn) { display: none; }
      #navBar span:not(#rangeLabel):not(#errorText):not(#sortBadge) { display: none; }
      #zoomControls { display: none; }
      #rangeLabel { font-size: 12px; min-width: 100px; }
    }
  </style>
</head>
<body>

  <!-- スマホ ハンバーガーメニュー -->
  <div id="mobileMenu">
    <div id="mobileMenuInner">
      <button id="mobileMenuClose">✕</button>
      <a class="mobile-menu-btn" href="/calendar.html">📅 カレンダーへ</a>
      <a class="mobile-menu-btn" href="/shipping-calendar.html" style="background:#e0f7fa;color:#006064;border-color:#4dd0e1;">📦 発送確認</a>
      <div style="border-top:1px solid #e5e7eb; padding-top:8px; font-size:12px; color:#6b7280;">ズーム</div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="mobile-menu-btn" id="mobileZoomOut" style="width:auto;padding:8px 16px;">－</button>
        <span id="mobileZoomLabel" style="font-size:13px;color:#374151;">100%</span>
        <button class="mobile-menu-btn" id="mobileZoomIn" style="width:auto;padding:8px 16px;">＋</button>
      </div>
    </div>
  </div>

  <div id="navBar">
    <button id="hamburgerBtn">☰</button>
    <button class="nav-btn" onclick="location.href='/calendar.html'">← カレンダーへ</button>
    <button class="nav-btn" onclick="location.href='/shipping-calendar.html'">📦 発送確認</button>
    <span style="font-size:13px;font-weight:700;">👤 通訳カレンダー</span>
    <div style="flex:1;"></div>
    <span id="sortBadge" onclick="clearSort()">📅 ソート中 ✕</span>
    <button class="nav-btn" id="prevBtn">◀ 前へ</button>
    <span id="rangeLabel"></span>
    <button class="nav-btn" id="nextBtn">次へ ▶</button>
    <div id="zoomControls" style="display:none;">
      <button id="zoomOutBtn">－</button>
      <span id="zoomLabel">100%</span>
      <button id="zoomInBtn">＋</button>
    </div>
    <span id="errorText"></span>
  </div>

  <div id="pageWrap">
    <div id="mainPane">
      <div id="zoomWrapper">
        <div id="loadingMsg">読み込み中...</div>
        <table id="calTable" style="display:none;">
          <thead id="calHead"></thead>
          <tbody id="calBody"></tbody>
        </table>
      </div>
    </div>
    <div id="detailPane">
      <div id="detailClose">
        <div class="detail-actions">
          <a id="btnEdit" class="btn-edit" href="#">✏️ 案件編集</a>
          <button id="btnDelete" class="btn-delete" onclick="deleteProject()">🗑️ 案件削除</button>
        </div>
        <button class="close-btn" id="closeDetailBtn">✕</button>
      </div>
      <div id="detailInner"></div>
    </div>
  </div><!-- /pageWrap -->

<script>
(() => {
  'use strict';

  const TZ = 'Asia/Tokyo';
  const WEEKDAYS = ['日','月','火','水','木','金','土'];

  // ★ 抽出するキーワードリスト
  // 「キーワード：名前1、名前2」形式で複数名対応
  // コロンは全角（：）・半角(:)両対応、「さん」は自動除去
  const KEYWORDS = ['通訳'];

  const prevBtn    = document.getElementById('prevBtn');
  const nextBtn    = document.getElementById('nextBtn');
  const rangeLabel = document.getElementById('rangeLabel');
  const calHead    = document.getElementById('calHead');
  const calBody    = document.getElementById('calBody');
  const calTable   = document.getElementById('calTable');
  const loadingMsg = document.getElementById('loadingMsg');
  const errorText  = document.getElementById('errorText');
  const zoomWrapper = document.getElementById('zoomWrapper');
  const zoomLabel  = document.getElementById('zoomLabel');
  const zoomInBtn  = document.getElementById('zoomInBtn');
  const zoomOutBtn = document.getElementById('zoomOutBtn');
  const mainPane   = document.getElementById('mainPane');
  const sortBadge  = document.getElementById('sortBadge');

  let offsetDays = 0;
  let sortByDate = null; // ソート対象の日付文字列

  // ズーム
  const ZOOM_STEPS = [30, 40, 50, 60, 70, 80, 90, 100];
  let zoomIdx = ZOOM_STEPS.indexOf(100);

  function applyZoom() {
    // calTableにzoomをかける（stickyを維持するため）
    // PC:100% / スマホ:80% 固定
    const isMobile = window.innerWidth <= 900;
    const scale = isMobile ? 0.8 : 1.0;
    const tbl = document.getElementById('calTable');
    if (tbl) tbl.style.zoom = scale;
    if (zoomLabel) zoomLabel.textContent = isMobile ? '80%' : '100%';
  }
  if (zoomInBtn)  zoomInBtn.disabled = true;
  if (zoomOutBtn) zoomOutBtn.disabled = true;

  function pad2(n) { return String(n).padStart(2,'0'); }

  function toJstDateStr(isoStr) {
    if (!isoStr) return null;
    const d = new Date(isoStr);
    return new Intl.DateTimeFormat('en-CA', { timeZone: TZ, year:'numeric', month:'2-digit', day:'2-digit' }).format(d);
  }

  function todayJst() { return toJstDateStr(new Date().toISOString()); }

  function addDays(dateStr, n) {
    const [y, m, d] = dateStr.split('-').map(Number);
    const dt = new Date(Date.UTC(y, m-1, d));
    dt.setUTCDate(dt.getUTCDate() + n);
    return `${dt.getUTCFullYear()}-${pad2(dt.getUTCMonth()+1)}-${pad2(dt.getUTCDate())}`;
  }

  function getWeekday(dateStr) {
    const [y, m, d] = dateStr.split('-').map(Number);
    return new Date(Date.UTC(y, m-1, d)).getUTCDay();
  }

  function getDaysInRange() {
    const days = [];
    const start = addDays(todayJst(), offsetDays - 7);
    for (let i = 0; i < 69; i++) days.push(addDays(start, i));
    return days;
  }

  function updateRangeLabel(days) {
    if (!days.length) return;
    const s = days[0].split('-').map(Number);
    const e = days[days.length-1].split('-').map(Number);
    rangeLabel.textContent = `${s[0]}/${pad2(s[1])}/${pad2(s[2])} 〜 ${e[0]}/${pad2(e[1])}/${pad2(e[2])}`;
  }

  // メモからスタッフ名を抽出
  // 「通訳：名前1、名前2さん」→ ['名前1', '名前2']
  // コロンは全角（：）・半角(:)両対応
  // 区切りは「、」「,」「，」スペース対応
  // 「さん」は除去
  function extractNames(memo) {
    if (!memo) return [];
    const names = new Set();

    for (const kw of KEYWORDS) {
      // キーワード + 全角/半角コロン + 以降の文字（改行まで）
      const re = new RegExp(kw + '[：:]([^\n\r]+)', 'g');
      let m;
      while ((m = re.exec(memo)) !== null) {
        // 「、」「,」「，」「　」「 」で分割
        const parts = m[1].split(/[、,，　\s]+/);
        for (const part of parts) {
          // 「さん」を除去、→以降を除去、（）内を除去、前後の空白を除去
          const name = part
            .replace(/さん/g, '')
            .replace(/→.*/g, '')
            .replace(/（[^）]*）/g, '')
            .replace(/\([^)]*\)/g, '')
            .replace(/[　\s]/g, '')
            .trim();
          // 数字始まり、英数字のみ、「名」で終わるものは除外
          if (name.length > 0
            && !/^\d/.test(name)
            && !/^[a-zA-Z0-9]+$/.test(name)
            && !/名$/.test(name)
          ) names.add(name);
        }
      }
    }

    return [...names];
  }

  function getTimeStr(isoStr) {
    if (!isoStr) return '';
    const d = new Date(isoStr);
    return new Intl.DateTimeFormat('ja-JP', { timeZone: TZ, hour:'2-digit', minute:'2-digit', hour12: false }).format(d);
  }

  function lightenColor(hex, amount) {
    if (!hex || !hex.startsWith('#')) return null;
    const num = parseInt(hex.replace('#', ''), 16);
    const r = Math.min(255, (num >> 16) + amount);
    const g = Math.min(255, ((num >> 8) & 0xff) + amount);
    const b = Math.min(255, (num & 0xff) + amount);
    return `rgb(${r},${g},${b})`;
  }

  async function fetchProjects() {
    const token = localStorage.getItem('token') || '';
    const res = await fetch('/api/projects/interpreter', {
      headers: { Accept: 'application/json', Authorization: `Bearer ${token}` }
    });
    const json = await res.json();
    if (!res.ok) throw new Error(json.error || `HTTP ${res.status}`);
    return Array.isArray(json) ? json : json.projects || [];
  }

  function buildTable(projects, days) {
    const today  = todayJst();
    const daySet = new Set(days);

    // 名前→案件マッピングを構築
    // staffMap: { 名前: [ {project, dateStr} ] }
    const staffMap = {};

    for (const p of projects) {
      const names = extractNames(p.memo);
      if (!names.length) continue;

      const eventStart = toJstDateStr(p.usage_start_at || p.usage_start);
      const eventEnd   = toJstDateStr(p.usage_end_at   || p.usage_end);
      if (!eventStart || !eventEnd) continue;

      // この案件が表示期間内にあるか
      const rangeEnd = days[days.length-1];
      const rangeStart = days[0];
      if (eventStart > rangeEnd || eventEnd < rangeStart) continue;

      for (const name of names) {
        if (!staffMap[name]) staffMap[name] = [];
        staffMap[name].push(p);
      }
    }

    let staffList = Object.keys(staffMap).sort();

    // ソート：指定日に予定がある人を上に
    if (sortByDate) {
      staffList = staffList.sort((a, b) => {
        const aHas = staffMap[a].some(p => {
          const s = toJstDateStr(p.usage_start_at || p.usage_start);
          const e = toJstDateStr(p.usage_end_at   || p.usage_end);
          return s <= sortByDate && e >= sortByDate;
        });
        const bHas = staffMap[b].some(p => {
          const s = toJstDateStr(p.usage_start_at || p.usage_start);
          const e = toJstDateStr(p.usage_end_at   || p.usage_end);
          return s <= sortByDate && e >= sortByDate;
        });
        if (aHas && !bHas) return -1;
        if (!aHas && bHas) return 1;
        return a.localeCompare(b, 'ja');
      });
    }

    // ヘッダー
    calHead.innerHTML = '';
    const trH = document.createElement('tr');
    const thS = document.createElement('th');
    thS.className = 'th-staff';
    thS.textContent = 'スタッフ';
    trH.appendChild(thS);

    for (const day of days) {
      const th = document.createElement('th');
      const w = getWeekday(day);
      const [, dm, dd] = day.split('-').map(Number);
      th.innerHTML = `${dm}/${dd}<br><span style="font-weight:400;">${WEEKDAYS[w]}</span>`;
      if (w === 6) th.classList.add('is-sat');
      if (w === 0) th.classList.add('is-sun');
      if (day === today) th.classList.add('is-today');
      if (day === sortByDate) th.classList.add('sorted');
      th.classList.add('sortable');
      th.title = `${day} をクリックでこの日に予定がある人を上に表示`;

      // ソートインジケーター
      if (day === sortByDate) {
        const ind = document.createElement('span');
        ind.className = 'sort-indicator';
        ind.textContent = '▲';
        th.appendChild(ind);
      }

      th.addEventListener('click', () => {
        if (sortByDate === day) {
          clearSort();
        } else {
          sortByDate = day;
          sortBadge.style.display = 'inline-block';
          sortBadge.textContent = `📅 ${day} でソート中 ✕`;
          render();
        }
      });
      trH.appendChild(th);
    }
    calHead.appendChild(trH);

    calBody.innerHTML = '';

    if (!staffList.length) {
      const tr = document.createElement('tr');
      const td = document.createElement('td');
      td.colSpan = days.length + 1;
      td.textContent = 'メモに該当するスタッフ情報がありません';
      td.style.cssText = 'text-align:center;padding:40px;color:#9ca3af;font-size:13px;';
      tr.appendChild(td);
      calBody.appendChild(tr);
      return;
    }

    for (const name of staffList) {
      const myProjects = staffMap[name];
      const row = document.createElement('tr');

      // この行にソート日の予定があるか
      const hasSortDay = sortByDate && myProjects.some(p => {
        const s = toJstDateStr(p.usage_start_at || p.usage_start);
        const e = toJstDateStr(p.usage_end_at   || p.usage_end);
        return s <= sortByDate && e >= sortByDate;
      });
      if (hasSortDay) row.classList.add('has-sort');

      const tdS = document.createElement('td');
      tdS.className = 'td-staff';
      tdS.textContent = name;
      tdS.title = name;
      row.appendChild(tdS);

      for (const day of days) {
        const td = document.createElement('td');
        td.className = 'td-day';
        const w = getWeekday(day);
        if (w === 6) td.classList.add('is-sat');
        if (w === 0) td.classList.add('is-sun');
        if (day === today) td.classList.add('is-today');

        // この日にある案件を探す
        const dayProjects = myProjects.filter(p => {
          const s = toJstDateStr(p.usage_start_at || p.usage_start);
          const e = toJstDateStr(p.usage_end_at   || p.usage_end);
          return s && e && s <= day && e >= day;
        });

        for (const p of dayProjects) {
          const block = document.createElement('div');
          block.className = `ev-block ${p.status || 'draft'}`;

          // カスタムカラー適用
          if (p.color) {
            const bg = lightenColor(p.color, 70);
            if (bg) {
              block.style.background = bg;
              block.style.borderColor = p.color;
              block.style.color = '#333';
            }
          }

          const startTime = getTimeStr(p.usage_start_at || p.usage_start);
          const endTime   = getTimeStr(p.usage_end_at   || p.usage_end);
          const timeStr   = p.is_all_day ? '終日' : `${startTime}〜${endTime}`;

          block.innerHTML = `
            <div class="ev-title">${p.title || '(無題)'}</div>
            <div class="ev-time">${timeStr}</div>
          `;
          block.title = `${p.title || ''} ${timeStr}`;

          // 長押し判定
          let pressTimer = null;
          let isLongPress = false;

          block.addEventListener('mousedown', ev => {
            if (ev.button !== 0) return;
            isLongPress = false;
            pressTimer = setTimeout(() => { isLongPress = true; }, 400);
          });
          block.addEventListener('mouseup', ev => {
            clearTimeout(pressTimer);
            if (ev.button !== 0) return;
            if (!isLongPress && !dragMoved) {
              openDetail(p);
            }
          });
          block.addEventListener('mouseleave', () => clearTimeout(pressTimer));

          td.appendChild(block);
        }

        row.appendChild(td);
      }

      calBody.appendChild(row);
    }

    // 当日列へスクロール
    if (offsetDays === 0) {
      setTimeout(() => {
        const todayTh = document.querySelector('#calHead th.is-today');
        if (todayTh) mainPane.scrollLeft = todayTh.offsetLeft - 120;
      }, 50);
    }
  }

  function clearSort() {
    sortByDate = null;
    sortBadge.style.display = 'none';
    render();
  }

  async function render() {
    errorText.textContent = '';
    loadingMsg.style.display = 'block';
    calTable.style.display = 'none';
    try {
      const days     = getDaysInRange();
      updateRangeLabel(days);
      const projects = await fetchProjects();
      buildTable(projects, days);
      loadingMsg.style.display = 'none';
      calTable.style.display = '';
    } catch(e) {
      loadingMsg.textContent = 'エラーが発生しました';
      errorText.textContent = e.message;
    }
  }

  // ドラッグスクロール
  let isDragging = false;
  let dragStartX = 0, dragStartY = 0;
  let dragScrollLeft = 0, dragScrollTop = 0;
  let dragMoved = false;
  mainPane.style.userSelect = 'none';
  mainPane.addEventListener('mousedown', ev => {
    if (ev.button !== 0) return;
    isDragging = true;
    dragMoved = false;
    dragStartX = ev.clientX;
    dragStartY = ev.clientY;
    dragScrollLeft = mainPane.scrollLeft;
    dragScrollTop  = mainPane.scrollTop;
    mainPane.style.cursor = 'grabbing';
  });
  document.addEventListener('mousemove', ev => {
    if (!isDragging) return;
    const dx = ev.clientX - dragStartX;
    const dy = ev.clientY - dragStartY;
    if (Math.abs(dx) > 4 || Math.abs(dy) > 4) dragMoved = true;
    mainPane.scrollLeft = dragScrollLeft - dx;
    mainPane.scrollTop  = dragScrollTop  - dy;
  });
  document.addEventListener('mouseup', () => {
    isDragging = false;
    mainPane.style.cursor = '';
    setTimeout(() => { dragMoved = false; }, 0);
  });

  let currentProjectId = null;

  function openDetail(p) {
    currentProjectId = p.id;
    const pane = document.getElementById('detailPane');
    const inner = document.getElementById('detailInner');
    const btnEdit = document.getElementById('btnEdit');

    const startTime = getTimeStr(p.usage_start_at || p.usage_start);
    const endTime   = getTimeStr(p.usage_end_at   || p.usage_end);
    const timeStr   = p.is_all_day ? '終日' : `${startTime}〜${endTime}`;
    const startDate = toJstDateStr(p.usage_start_at || p.usage_start) || '';
    const endDate   = toJstDateStr(p.usage_end_at   || p.usage_end)   || '';

    const statusMap = { draft:'未確定', confirmed:'確定', cancelled:'キャンセル' };

    inner.innerHTML = `
      <h3>${p.title || '(無題)'}</h3>
      <div class="detail-row"><span class="detail-label">ステータス</span><br><span class="detail-val">${statusMap[p.status] || p.status || '-'}</span></div>
      <div class="detail-row"><span class="detail-label">クライアント</span><br><span class="detail-val">${p.client_name || '-'}</span></div>
      <div class="detail-row"><span class="detail-label">会場</span><br><span class="detail-val">${p.venue || '-'}</span></div>
      <div class="detail-row"><span class="detail-label">担当者</span><br><span class="detail-val">${p.person_in_charge || '-'}</span></div>
      <div class="detail-row"><span class="detail-label">使用期間</span><br><span class="detail-val">${startDate} 〜 ${endDate}</span></div>
      <div class="detail-row"><span class="detail-label">時間</span><br><span class="detail-val">${timeStr}</span></div>
      ${p.memo ? `<div class="detail-label" style="margin-top:12px;">📝 メモ</div><div id="detailMemo">${p.memo}</div>` : ''}
    `;

    btnEdit.href = `/project-edit.html?id=${p.id}&return=${encodeURIComponent(location.pathname)}`;
    pane.classList.add('open');
  }

  function closeDetail() {
    document.getElementById('detailPane').classList.remove('open');
    currentProjectId = null;
  }

  window.deleteProject = async function() {
    if (!currentProjectId) return;
    if (!confirm('この案件を通訳カレンダーから非表示にしますか？\n（他のカレンダーには影響しません）')) return;
    const token = localStorage.getItem('token') || '';
    const res = await fetch(`/api/projects/${currentProjectId}/hide-interpreter`, {
      method: 'DELETE',
      headers: { Authorization: `Bearer ${token}` }
    });
    if (res.ok) {
      closeDetail();
      render();
    } else {
      alert('削除に失敗しました');
    }
  }

  document.getElementById('closeDetailBtn').addEventListener('click', closeDetail);

  prevBtn.addEventListener('click', () => { offsetDays -= 30; render(); });
  nextBtn.addEventListener('click', () => { offsetDays += 30; render(); });

  applyZoom();
  render();
})();
</script>

  <script>
    // ハンバーガーメニュー
    (function() {
      const menu = document.getElementById('mobileMenu');
      const openBtn = document.getElementById('hamburgerBtn');
      const closeBtn = document.getElementById('mobileMenuClose');
      if (!menu || !openBtn) return;
      openBtn.addEventListener('click', () => menu.classList.add('open'));
      closeBtn.addEventListener('click', () => menu.classList.remove('open'));
      menu.addEventListener('click', (e) => { if (e.target === menu) menu.classList.remove('open'); });
      const mzIn    = document.getElementById('mobileZoomIn');
      const mzOut   = document.getElementById('mobileZoomOut');
      const mzLabel = document.getElementById('mobileZoomLabel');
      if (mzIn) mzIn.addEventListener('click', () => {
        document.getElementById('zoomInBtn') && document.getElementById('zoomInBtn').click();
        if (mzLabel) mzLabel.textContent = document.getElementById('zoomLabel').textContent;
      });
      if (mzOut) mzOut.addEventListener('click', () => {
        document.getElementById('zoomOutBtn') && document.getElementById('zoomOutBtn').click();
        if (mzLabel) mzLabel.textContent = document.getElementById('zoomLabel').textContent;
      });
    })();
  </script>

  <script>
    // 右タブ スワイプで閉じる（スマホ対応）
    (function() {
      document.addEventListener('DOMContentLoaded', function() {
        const pane = document.getElementById('detailPane');
        if (!pane) return;
        let startX = 0, startY = 0;
        pane.addEventListener('touchstart', function(e) {
          startX = e.touches[0].clientX;
          startY = e.touches[0].clientY;
        }, { passive: true });
        pane.addEventListener('touchend', function(e) {
          const dx = e.changedTouches[0].clientX - startX;
          const dy = Math.abs(e.changedTouches[0].clientY - startY);
          if (dx > 50 && dy < 30) {
            pane.classList.remove('open');
          }
        }, { passive: true });
      });
    })();
  </script>


  <script>
    // ダブルタップズーム無効化
    (function() {
      let lastTap = 0;
      document.addEventListener('touchend', function(e) {
        const now = Date.now();
        if (now - lastTap < 300) e.preventDefault();
        lastTap = now;
      }, { passive: false });
    })();
  </script>
