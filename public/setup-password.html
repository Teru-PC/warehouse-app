<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>初回パスワード設定</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: sans-serif; background: #f3f4f6;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0;
    }
    .card {
      background: #fff; border-radius: 16px; padding: 32px 28px;
      width: 100%; max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    h1 { font-size: 20px; margin: 0 0 8px 0; text-align: center; }
    .subtitle { text-align: center; font-size: 13px; color: #6b7280; margin-bottom: 24px; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #374151; }
    input {
      width: 100%; padding: 12px 14px;
      border: 1px solid #d1d5db; border-radius: 10px;
      font-size: 15px; margin-bottom: 16px; outline: none;
    }
    input:focus { border-color: #2563eb; }
    button {
      width: 100%; padding: 14px;
      background: #2563eb; color: #fff;
      border: none; border-radius: 10px;
      font-size: 16px; font-weight: 700;
      cursor: pointer; margin-top: 4px;
    }
    button:hover { background: #1d4ed8; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg { font-size: 13px; margin-top: 12px; text-align: center; }
    .msg.error { color: #b91c1c; }
    .msg.success { color: #166534; }
    .back-link {
      display: block; text-align: center; margin-top: 16px;
      font-size: 13px; color: #6b7280; text-decoration: none;
    }
    .back-link:hover { color: #2563eb; }
    .note {
      background: #f0f9ff; border-radius: 8px; padding: 12px 14px;
      font-size: 12px; color: #0369a1; margin-bottom: 20px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔑 初回パスワード設定</h1>
    <p class="subtitle">倉庫機材管理システム</p>

    <div class="note">
      登録されたメールアドレスと<br>
      新しいパスワード（6文字以上）を入力してください。
    </div>

    <label for="email">メールアドレス</label>
    <input id="email" type="email" placeholder="your@email.com" autocomplete="email" />

    <label for="password">パスワード（6文字以上）</label>
    <input id="password" type="password" placeholder="パスワードを決めてください" />

    <label for="password2">パスワード確認</label>
    <input id="password2" type="password" placeholder="もう一度入力" />

    <button id="setupBtn">パスワードを設定する</button>
    <p id="msg" class="msg"></p>

    <a class="back-link" href="/login.html">← ログイン画面に戻る</a>
  </div>

  <script>
    async function setup() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const password2= document.getElementById('password2').value;
      const msg      = document.getElementById('msg');
      const btn      = document.getElementById('setupBtn');

      msg.textContent = '';
      msg.className = 'msg';

      if (!email || !password || !password2) {
        msg.textContent = 'すべての項目を入力してください';
        msg.className = 'msg error';
        return;
      }
      if (password.length < 6) {
        msg.textContent = 'パスワードは6文字以上にしてください';
        msg.className = 'msg error';
        return;
      }
      if (password !== password2) {
        msg.textContent = 'パスワードが一致しません';
        msg.className = 'msg error';
        return;
      }

      btn.disabled = true;
      btn.textContent = '設定中…';

      try {
        const res = await fetch('/api/auth/setup-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();

        if (!res.ok) {
          msg.textContent = data.error || 'エラーが発生しました';
          msg.className = 'msg error';
          return;
        }

        msg.textContent = '✅ パスワードを設定しました！ログイン画面に移動します…';
        msg.className = 'msg success';
        setTimeout(() => { location.href = '/login.html'; }, 2000);
      } catch (e) {
        msg.textContent = 'サーバーエラーが発生しました';
        msg.className = 'msg error';
      } finally {
        btn.disabled = false;
        btn.textContent = 'パスワードを設定する';
      }
    }

    document.getElementById('setupBtn').addEventListener('click', setup);
    document.getElementById('password2').addEventListener('keydown', e => {
      if (e.key === 'Enter') setup();
    });
  </script>
</body>
</html>
