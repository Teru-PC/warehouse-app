<!doctype html>
<html lang="ja">
<head>
  <script src="/js/auth.js"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes" />
  <title>ゴミ箱</title>
  <link rel="icon" href="data:," />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f8fafc; color: #111827; }

    #navBar {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    #navBar h1 { font-size: 15px; font-weight: 700; flex: 1; }
    .nav-btn {
      padding: 6px 14px;
      border: 1px solid #e5e7eb;
      background: #fff;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
    }
    .nav-btn:hover { background: #f3f4f6; }

    #container { max-width: 900px; margin: 32px auto; padding: 0 16px; }

    #emptyMsg {
      text-align: center;
      color: #9ca3af;
      font-size: 14px;
      margin-top: 60px;
    }

    .trash-item {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .trash-item:hover { background: #fafafa; }

    .trash-info { flex: 1; }
    .trash-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .trash-meta { font-size: 12px; color: #6b7280; }

    .status-badge {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
    }
    .status-draft     { background: #dbeafe; color: #1e3a5f; }
    .status-confirmed { background: #dcfce7; color: #14532d; }
    .status-cancelled { background: #fee2e2; color: #7f1d1d; }

    .delete-btn {
      padding: 6px 14px;
      background: #fee2e2;
      color: #b91c1c;
      border: 1px solid #fca5a5;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
    }
    .delete-btn:hover { background: #fecaca; }

    #loadingMsg { text-align: center; padding: 40px; color: #6b7280; }
  </style>
</head>
<body>

<div id="navBar">
  <button class="nav-btn" onclick="location.href='/calendar.html'">← カレンダーへ</button>
  <h1>🗑️ ゴミ箱</h1>
</div>

<div id="container">
  <div id="loadingMsg">読み込み中...</div>
  <div id="emptyMsg" style="display:none;">ゴミ箱は空です</div>
  <div id="trashList"></div>
</div>

<script>
(() => {
  const token = localStorage.getItem('token') || '';
  const authHeader = { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' };

  const trashList = document.getElementById('trashList');
  const loadingMsg = document.getElementById('loadingMsg');
  const emptyMsg = document.getElementById('emptyMsg');

  function formatDate(str) {
    if (!str) return '-';
    return str.slice(0, 10);
  }

  function statusLabel(s) {
    if (s === 'confirmed') return ['確定', 'status-confirmed'];
    if (s === 'cancelled') return ['キャンセル', 'status-cancelled'];
    return ['仮', 'status-draft'];
  }

  async function load() {
    try {
      const res = await fetch('/api/trash', { headers: authHeader });
      const items = await res.json();
      loadingMsg.style.display = 'none';

      if (!items.length) {
        emptyMsg.style.display = 'block';
        return;
      }

      trashList.innerHTML = '';
      for (const item of items) {
        const [label, cls] = statusLabel(item.status);
        const deletedAt = item.deleted_at ? new Date(item.deleted_at).toLocaleString('ja-JP') : '-';
        const usageStart = item.usage_start ? new Date(item.usage_start).toLocaleString('ja-JP', { timeZone: 'Asia/Tokyo', month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' }) : '-';

        const div = document.createElement('div');
        div.className = 'trash-item';
        div.innerHTML = `
          <div class="trash-info">
            <div class="trash-title">
              <span class="status-badge ${cls}">${label}</span>
              　${item.title || '(無題)'}
            </div>
            <div class="trash-meta">
              ${item.client_name || ''} ／ ${item.venue || ''} ／ 本番：${usageStart}　削除日時：${deletedAt}
            </div>
          </div>
          <button class="restore-btn" data-id="${item.id}" style="padding:6px 14px;background:#dbeafe;color:#1e40af;border:1px solid #93c5fd;border-radius:8px;cursor:pointer;font-weight:600;font-size:12px;margin-right:6px;">↩ 元に戻す</button>
          <button class="delete-btn" data-id="${item.id}">🗑️ 完全削除</button>
        `;
        trashList.appendChild(div);
      }

      // 復元ボタン
      trashList.querySelectorAll('.restore-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('この案件をカレンダーに復元しますか？')) return;
          const id = btn.dataset.id;
          try {
            const res = await fetch(`/api/trash/${id}/restore`, { method: 'POST', headers: authHeader });
            if (!res.ok) throw new Error('復元に失敗しました');
            alert('復元しました');
            btn.closest('.trash-item').remove();
            if (!trashList.querySelector('.trash-item')) {
              emptyMsg.style.display = 'block';
            }
          } catch (e) {
            alert(e.message);
          }
        });
      });

      // 完全削除ボタン
      trashList.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('完全に削除します。この操作は取り消せません。よろしいですか？')) return;
          const id = btn.dataset.id;
          try {
            const res = await fetch(`/api/trash/${id}`, { method: 'DELETE', headers: authHeader });
            if (!res.ok) throw new Error('削除に失敗しました');
            btn.closest('.trash-item').remove();
            if (!trashList.querySelector('.trash-item')) {
              emptyMsg.style.display = 'block';
            }
          } catch (e) {
            alert(e.message);
          }
        });
      });

    } catch (e) {
      loadingMsg.textContent = '読み込みに失敗しました: ' + e.message;
    }
  }

  load();
})();
</script>
</body>
</html>
