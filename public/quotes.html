<!doctype html>
<html lang="ja">
<head>
  <script src="/js/auth.js"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes" />
  <title>見積書生成</title>
  <link rel="icon" href="data:," />
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 0; background: #f6f7f9; color: #111; }

    header {
      position: sticky; top: 0; background: #fff;
      border-bottom: 1px solid #e5e7eb; padding: 8px 12px;
      z-index: 10; display: flex; align-items: center; gap: 8px;
      flex-wrap: nowrap; overflow: hidden;
    }
    header h1 { margin: 0; font-size: 16px; white-space: nowrap; flex-shrink: 0; }
    .pill {
      font-size: 12px; padding: 6px 10px; border-radius: 999px;
      background: #f3f4f6; border: 1px solid #e5e7eb;
      cursor: pointer; text-decoration: none; color: #111; white-space: nowrap;
    }
    .pill:hover { background: #e5e7eb; }

    main { padding: 16px 14px; max-width: 860px; margin: 0 auto; }

    .card {
      background: #fff; border: 1px solid #e5e7eb;
      border-radius: 14px; padding: 16px; margin-bottom: 14px;
    }
    .card h2 { margin: 0 0 10px; font-size: 14px; color: #374151; }

    textarea {
      width: 100%; padding: 10px 12px;
      border: 1px solid #d1d5db; border-radius: 10px;
      font-size: 14px; font-family: inherit; resize: vertical;
      min-height: 180px; line-height: 1.6;
    }
    textarea:focus { outline: 2px solid #2563eb; border-color: transparent; }

    .btn {
      padding: 10px 18px; border-radius: 10px;
      border: 1px solid #e5e7eb; background: #fff;
      cursor: pointer; font-size: 14px; font-weight: 600;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #111827; color: #fff; border-color: #111827; }
    .btn-primary:hover:not(:disabled) { background: #1f2937; }
    .btn-pdf      { background: #fee2e2; color: #b91c1c; border-color: #fca5a5; }
    .btn-pdf:hover:not(:disabled)      { background: #fecaca; }
    .btn-download  { background: #eff6ff; color: #1d4ed8; border-color: #93c5fd; }
    .btn-download:hover:not(:disabled) { background: #dbeafe; }

    #generateBtn { display: flex; align-items: center; gap: 8px; }

    .loading {
      display: none; align-items: center; gap: 8px;
      font-size: 13px; color: #6b7280; padding: 4px 0;
    }
    .loading.show { display: flex; }
    .spinner {
      width: 18px; height: 18px; border: 2px solid #e5e7eb;
      border-top-color: #2563eb; border-radius: 50%;
      animation: spin 0.7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .err { color: #b91c1c; font-size: 13px; padding: 8px 12px; background: #fef2f2; border-radius: 8px; border: 1px solid #fecaca; }

    /* プレビューエリア */
    #previewArea { display: none; }

    .form-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
    .form-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 180px; }
    .form-group label { font-size: 11px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; }
    .form-group input, .form-group select {
      padding: 8px 10px; border: 1px solid #d1d5db;
      border-radius: 8px; font-size: 14px; font-family: inherit;
      width: 100%;
    }
    .form-group input:focus, .form-group select:focus { outline: 2px solid #2563eb; border-color: transparent; }

    /* 品目テーブル */
    .items-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .items-table th {
      background: #f9fafb; border: 1px solid #e5e7eb;
      padding: 7px 10px; text-align: left; font-weight: 700;
      white-space: nowrap; color: #374151;
    }
    .items-table td {
      border: 1px solid #e5e7eb; padding: 5px 6px; vertical-align: middle;
    }
    .items-table input {
      width: 100%; border: none; background: transparent;
      font-size: 13px; font-family: inherit; padding: 2px 4px;
      text-align: right;
    }
    .items-table input:focus { outline: 2px solid #2563eb; border-radius: 4px; background: #eff6ff; }
    .items-table .td-name input { text-align: left; }
    .items-table .td-sub { text-align: right; padding: 5px 10px; white-space: nowrap; font-weight: 600; }
    .items-table .td-del { width: 32px; text-align: center; }
    .del-btn {
      background: none; border: none; cursor: pointer;
      color: #9ca3af; font-size: 16px; padding: 0 4px; line-height: 1;
    }
    .del-btn:hover { color: #b91c1c; }

    .total-row { display: flex; justify-content: flex-end; align-items: center; gap: 12px; margin-top: 10px; }
    .total-label { font-size: 14px; color: #374151; font-weight: 700; }
    .total-amount { font-size: 22px; font-weight: 800; color: #111827; }

    .action-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }
    .add-item-btn {
      background: none; border: 1px dashed #d1d5db;
      border-radius: 8px; padding: 6px 14px;
      font-size: 13px; color: #6b7280; cursor: pointer; width: 100%;
    }
    .add-item-btn:hover { background: #f9fafb; color: #374151; }

    /* ハンバーガー */
    #hamburgerBtn {
      display: none; background: none; border: none;
      font-size: 22px; cursor: pointer; padding: 4px 8px; flex-shrink: 0;
    }
    #mobileMenu {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 500;
    }
    #mobileMenu.open { display: block; }
    #mobileMenuInner {
      position: absolute; top: 0; left: 0; width: 240px; height: 100%;
      background: #fff; padding: 16px 12px;
      display: flex; flex-direction: column; gap: 10px;
      box-shadow: 4px 0 16px rgba(0,0,0,0.15);
    }
    #mobileMenuClose {
      align-self: flex-end; background: none; border: none;
      font-size: 22px; cursor: pointer; color: #374151;
    }
    .mobile-menu-btn {
      display: block; width: 100%; padding: 10px 14px;
      border-radius: 10px; border: 1px solid #e5e7eb; background: #f9fafb;
      font-size: 14px; font-weight: 700; text-decoration: none;
      color: #111827; text-align: left; cursor: pointer;
    }
    .mobile-menu-btn:hover { background: #f3f4f6; }

    .td-drag { width: 28px; text-align: center; padding: 0 2px; }
    .drag-handle {
      cursor: grab; color: #9ca3af; font-size: 16px;
      user-select: none; display: inline-block; padding: 2px 4px;
      touch-action: none;
    }
    .drag-handle:active { cursor: grabbing; color: #374151; }
    tr.dragging { opacity: 0.5; background: #dbeafe !important; }
    tr.drag-over { outline: 2px solid #2563eb; outline-offset: -2px; }

    .preset-btns { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .preset-btn {
      padding: 5px 12px; border-radius: 8px;
      border: 1px solid #d1d5db; background: #f9fafb;
      font-size: 12px; font-weight: 600; color: #374151; cursor: pointer;
    }
    .preset-btn:hover { background: #e5e7eb; border-color: #9ca3af; }

    .split-label {
      font-size: 13px; font-weight: 700; color: #1d4ed8;
      padding: 6px 0 4px; border-bottom: 1px solid #dbeafe;
      margin-bottom: 8px; margin-top: 2px;
    }

    @media (max-width: 640px) {
      #hamburgerBtn { display: block; }
      header .pill { display: none; }
      .form-group { min-width: 100%; }
      .items-table { font-size: 12px; }
    }
  </style>
</head>
<body>

  <div id="mobileMenu">
    <div id="mobileMenuInner">
      <button id="mobileMenuClose">✕</button>
      <a class="mobile-menu-btn" href="/calendar.html">📅 カレンダー</a>
      <a class="mobile-menu-btn" href="/equipment.html">🔧 機材管理</a>
      <a class="mobile-menu-btn" href="/shipping-calendar.html" style="background:#e0f7fa;color:#006064;border-color:#4dd0e1;">🚚 発送確認</a>
      <a class="mobile-menu-btn" href="/staff-calendar.html" style="background:#e8f5e9;color:#1b5e20;border-color:#a5d6a7;">👤 通訳</a>
      <a class="mobile-menu-btn" href="/settings.html">⚙ 設定</a>
    </div>
  </div>

  <header>
    <h1>見積書生成</h1>
    <button id="hamburgerBtn">☰</button>
    <div style="display:flex; gap:6px; align-items:center; margin-left:auto; flex-shrink:0; flex-wrap:wrap;">
      <a class="pill" href="/calendar.html">📅 カレンダー</a>
      <a class="pill" href="/equipment.html">🔧 機材管理</a>
      <a class="pill" href="/shipping-calendar.html" style="background:#e0f7fa;color:#006064;border-color:#4dd0e1;">🚚 発送確認</a>
      <a class="pill" href="/staff-calendar.html" style="background:#e8f5e9;color:#1b5e20;border-color:#a5d6a7;">👤 通訳</a>
      <a class="pill" href="/settings.html" style="background:#f3f4f6;color:#374151;border-color:#d1d5db;">⚙ 設定</a>
    </div>
  </header>

  <main>

    <!-- エラー表示 -->
    <div id="errorArea" style="display:none; margin-bottom:12px;"></div>

    <!-- 入力エリア -->
    <div class="card">
      <h2>メール本文を貼り付け</h2>
      <textarea id="emailText" autocomplete="off" placeholder="ここにメール本文を貼り付けてください…&#10;&#10;例）&#10;いつもお世話になっております。&#10;〇〇株式会社の田中と申します。&#10;3月15日（土）の国際会議にて通訳・機材一式をご依頼したく…"></textarea>
      <div style="display:flex; align-items:center; gap:12px; margin-top:10px; flex-wrap:wrap;">
        <button class="btn btn-primary" id="generateBtn" type="button">見積書を生成</button>
        <div class="loading" id="loading">
          <div class="spinner"></div>
          <span>AIが解析中です…</span>
        </div>
      </div>
    </div>

    <!-- プレビュー＆編集エリア -->
    <div id="previewArea">

      <!-- ヘッダー情報 -->
      <div class="card">
        <h2>見積書情報</h2>
        <div class="form-row">
          <div class="form-group">
            <label>種類</label>
            <select id="fType">
              <option value="interpretation">通訳</option>
              <option value="equipment">機材</option>
              <option value="both">通訳＋機材</option>
              <option value="english">英語版</option>
            </select>
          </div>
          <div class="form-group">
            <label>顧客名</label>
            <input type="text" id="fCustomer" placeholder="株式会社〇〇" autocomplete="off" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>案件名</label>
            <input type="text" id="fProject" placeholder="国際会議 2025" autocomplete="off" />
          </div>
          <div class="form-group">
            <label>日程</label>
            <input type="text" id="fDate" placeholder="2025年3月15日" autocomplete="off" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>場所</label>
            <input type="text" id="fLocation" placeholder="東京国際フォーラム" autocomplete="off" />
          </div>
        </div>
      </div>

      <!-- 通訳品目 -->
      <div class="card" id="interpCard">
        <h2>通訳品目</h2>
        <div style="overflow-x:auto;">
          <table class="items-table">
            <thead>
              <tr>
                <th class="td-drag"></th>
                <th style="width:38%;">品名</th>
                <th style="width:11%; text-align:right;">数量</th>
                <th style="width:10%;">単位</th>
                <th style="width:17%; text-align:right;">単価（円）</th>
                <th style="width:13%; text-align:right;">小計（円）</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="interpBody"></tbody>
          </table>
        </div>
        <button class="add-item-btn" id="addInterpBtn" type="button" style="margin-top:8px;">＋ 行を追加</button>
      </div>

      <!-- 機材品目 -->
      <div class="card" id="equipCard">
        <h2>機材品目</h2>
        <div id="equipPresetBtns" class="preset-btns"></div>

        <!-- 通常モード -->
        <div id="equipSingle">
          <div style="overflow-x:auto;">
            <table class="items-table">
              <thead>
                <tr>
                  <th class="td-drag"></th>
                  <th style="width:38%;">品名</th>
                  <th style="width:11%; text-align:right;">数量</th>
                  <th style="width:10%;">単位</th>
                  <th style="width:17%; text-align:right;">単価（円）</th>
                  <th style="width:13%; text-align:right;">小計（円）</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="equipBody"></tbody>
            </table>
          </div>
        </div>

        <!-- 分割モード（ブリッジ・現地配信あり） -->
        <div id="equipSplit" style="display:none;">
          <div class="split-label">【スタジオ】</div>
          <div style="overflow-x:auto;">
            <table class="items-table">
              <thead>
                <tr>
                  <th class="td-drag"></th>
                  <th style="width:38%;">品名</th>
                  <th style="width:11%; text-align:right;">数量</th>
                  <th style="width:10%;">単位</th>
                  <th style="width:17%; text-align:right;">単価（円）</th>
                  <th style="width:13%; text-align:right;">小計（円）</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="studioBody"></tbody>
            </table>
          </div>
          <button class="add-item-btn" id="addStudioBtn" type="button" style="margin-top:8px;">＋ 行を追加</button>

          <div class="split-label" style="margin-top:14px;">【現地配信】</div>
          <div style="overflow-x:auto;">
            <table class="items-table">
              <thead>
                <tr>
                  <th class="td-drag"></th>
                  <th style="width:38%;">品名</th>
                  <th style="width:11%; text-align:right;">数量</th>
                  <th style="width:10%;">単位</th>
                  <th style="width:17%; text-align:right;">単価（円）</th>
                  <th style="width:13%; text-align:right;">小計（円）</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="localBody"></tbody>
            </table>
          </div>
          <button class="add-item-btn" id="addLocalBtn" type="button" style="margin-top:8px;">＋ 行を追加</button>
        </div>
      </div>

      <!-- 合計 -->
      <div class="card" style="padding:12px 16px;">
        <div class="total-row">
          <span class="total-label">合計金額</span>
          <span class="total-amount" id="totalAmount">¥0</span>
        </div>
      </div>

      <!-- アクションボタン -->
      <div class="action-row">
        <button class="btn btn-pdf"      id="pdfBtn"      type="button">📄 PDF確認</button>
        <button class="btn btn-download" id="downloadBtn" type="button">⬇ まとめてダウンロード</button>
      </div>

    </div><!-- /previewArea -->

  </main>

  <script src="/js/quotes.js"></script>
  <script>
    // ハンバーガーメニュー
    (function() {
      const menu     = document.getElementById('mobileMenu');
      const openBtn  = document.getElementById('hamburgerBtn');
      const closeBtn = document.getElementById('mobileMenuClose');
      openBtn.addEventListener('click', () => menu.classList.add('open'));
      closeBtn.addEventListener('click', () => menu.classList.remove('open'));
      menu.addEventListener('click', e => { if (e.target === menu) menu.classList.remove('open'); });
    })();
  </script>
</body>
</html>
