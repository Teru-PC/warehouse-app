<!doctype html>
<html lang="ja">
<head>
  <script src="/js/auth.js"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
  <title>発送確認カレンダー</title>
  <link rel="icon" href="data:," />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f8fafc; color: #111827; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    #navBar {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      padding: 6px 16px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
      z-index: 100;
    }
    .nav-btn {
      padding: 4px 10px;
      border: 1px solid #e5e7eb;
      background: #fff;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
    }
    .nav-btn:hover { background: #f3f4f6; }
    #monthPicker {
      padding: 4px 8px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
    }
    #errorText { color: #b91c1c; font-size: 12px; }

    #zoomControls {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-left: 12px;
    }
    #zoomControls button {
      padding: 2px 8px;
      border: 1px solid #e5e7eb;
      background: #fff;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.4;
    }
    #zoomControls button:hover { background: #f3f4f6; }
    #zoomLabel { font-size: 12px; color: #6b7280; min-width: 36px; text-align: center; }

    #mainLayout { display: flex; flex: 1; overflow: hidden; }

    #timelinePane { flex: 1; overflow: auto; border-right: 2px solid #e5e7eb; }

    #checklistPane {
      width: 0;
      flex-shrink: 0;
      overflow-y: auto;
      overflow-x: hidden;
      background: #fff;
      padding: 0;
      transition: width 0.2s ease, padding 0.2s ease;
    }
    #checklistPane.open {
      width: 360px;
      padding: 16px;
      border-left: 2px solid #e5e7eb;
    }
    #checklistPane h2 { font-size: 15px; font-weight: 700; margin-bottom: 4px; color: #1e40af; }
    #checklistPane .meta { font-size: 12px; color: #6b7280; margin-bottom: 12px; }

    .cl-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid #f3f4f6; }
    .cl-item input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; flex-shrink: 0; }
    .cl-item .item-name { flex: 1; font-size: 13px; }
    .cl-item .item-name.checked { text-decoration: line-through; color: #9ca3af; }
    .cl-item img { width: 36px; height: 36px; object-fit: cover; border-radius: 4px; border: 1px solid #e5e7eb; flex-shrink: 0; }

    #calTable { --cell-w: 80px; --cell-fs: 11px; }
    @media (max-width: 900px) {
      #calTable { --cell-w: 60px; --cell-fs: 9px; }
    }

    #calTable { border-collapse: collapse; white-space: nowrap; }

    #calTable thead th {
      position: sticky; top: 0; background: #fff; z-index: 20;
      border: 1px solid #e5e7eb; font-size: var(--cell-fs); font-weight: 700;
      padding: 4px 6px; text-align: center; min-width: 36px;
    }
    #calTable thead th.th-project {
      position: sticky; top: 0; left: 0; z-index: 30;
      min-width: 160px; text-align: left; padding-left: 8px;
    }
    #calTable thead th.is-sat { background: #eaf3ff; }
    #calTable thead th.is-sun { background: #ffecec; }
    #calTable thead th.is-today { background: #fef9c3; }

    #calTable tbody td.td-project {
      position: sticky; left: 0; z-index: 10; background: #fff;
      border: 1px solid #e5e7eb; font-size: 12px; font-weight: 700;
      padding: 4px 8px; min-width: 160px; max-width: 160px;
      overflow: hidden; text-overflow: ellipsis; cursor: pointer;
    }
    #calTable tbody td.td-project:hover { background: #f3f4f6; }

    #calTable tbody td.td-day {
      border: 1px solid #e5e7eb; padding: 0;
      height: 36px; min-width: 36px; vertical-align: middle;
    }
    #calTable tbody td.is-sat { background: #f6fbff; }
    #calTable tbody td.is-sun { background: #fff7f7; }
    #calTable tbody td.is-today { background: #fefce8; }

    .block {
      height: 100%; display: flex; align-items: center;
      padding: 2px 6px; font-size: 10px; font-weight: 700;
      cursor: pointer; overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; border-radius: 0;
    }
    .block:hover { filter: brightness(0.92); }

    .block.draft        { background: #93c5fd; color: #1e3a5f; }
    .block.confirmed    { background: #86efac; color: #14532d; }
    .block.cancelled    { background: #fca5a5; color: #7f1d1d; }

    .block.draft.light        { background: #dbeafe; color: #1e3a5f; }
    .block.confirmed.light    { background: #dcfce7; color: #14532d; }
    .block.cancelled.light    { background: #fee2e2; color: #7f1d1d; }

    .block.event-day { border-radius: 6px; font-size: 11px; }
    .block.light     { border-radius: 6px; }

    #loadingMsg { text-align: center; padding: 40px; color: #6b7280; font-size: 14px; }

    #zoomWrapper { /* zoom controlled by JS */ }

    /* ===== スマホ対応 ===== */
    #hamburgerBtn {
      display: none;
      background: none; border: none;
      font-size: 22px; cursor: pointer;
      padding: 4px 8px; flex-shrink: 0;
    }
    #mobileMenu {
      display: none;
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5); z-index: 500;
    }
    #mobileMenu.open { display: block; }
    #mobileMenuInner {
      position: absolute; top: 0; left: 0;
      width: 240px; height: 100%;
      background: #fff;
      padding: 16px 12px;
      display: flex; flex-direction: column; gap: 10px;
      box-shadow: 4px 0 16px rgba(0,0,0,0.15);
    }
    #mobileMenuClose {
      align-self: flex-end; background: none; border: none;
      font-size: 22px; cursor: pointer; color: #374151;
    }
    .mobile-menu-btn {
      display: block; width: 100%;
      padding: 10px 14px; border-radius: 10px;
      border: 1px solid #e5e7eb; background: #f9fafb;
      font-size: 14px; font-weight: 700;
      text-decoration: none; color: #111827;
      text-align: left; cursor: pointer;
    }
    .mobile-menu-btn:hover { background: #f3f4f6; }
    @media (max-width: 640px) {
      #hamburgerBtn { display: block; }
      #navBar .nav-btn:not(#prevMonthBtn):not(#nextMonthBtn) { display: none; }
      #navBar span:not(#rangeLabel):not(#errorText) { display: none; }
      #zoomControls { display: none; }
      #rangeLabel { font-size: 12px; min-width: 120px; }
    }
  </style>
</head>
<body>

  <!-- スマホ ハンバーガーメニュー -->
  <div id="mobileMenu">
    <div id="mobileMenuInner">
      <button id="mobileMenuClose">✕</button>
      <a class="mobile-menu-btn" href="/calendar.html">📅 カレンダーへ</a>
      <a class="mobile-menu-btn" href="/staff-calendar.html" style="background:#f0fdf4;border-color:#86efac;color:#166534;">👤 通訳カレンダー</a>
      <div style="border-top:1px solid #e5e7eb; padding-top:8px; font-size:12px; color:#6b7280;">ズーム</div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="mobile-menu-btn" id="mobileZoomOut" style="width:auto;padding:8px 16px;">－</button>
        <span id="mobileZoomLabel" style="font-size:13px;color:#374151;">100%</span>
        <button class="mobile-menu-btn" id="mobileZoomIn" style="width:auto;padding:8px 16px;">＋</button>
      </div>
    </div>
  </div>

  <div id="navBar">
    <button id="hamburgerBtn">☰</button>
    <button class="nav-btn" onclick="location.href='/calendar.html'">← カレンダーへ</button>
    <button class="nav-btn" onclick="location.href='/staff-calendar.html'" style="margin-left:8px;background:#f0fdf4;border-color:#86efac;color:#166534;">👤 通訳カレンダー</button>
    <span style="font-size:13px;font-weight:700;margin-left:12px;">📦 発送確認カレンダー</span>
    <div style="flex:1;"></div>
    <button class="nav-btn" id="prevMonthBtn">◀ 前へ</button>
    <span id="rangeLabel" style="margin:0 8px;font-size:13px;font-weight:600;color:#374151;min-width:180px;text-align:center;"></span>
    <button class="nav-btn" id="nextMonthBtn">次へ ▶</button>
    <div id="zoomControls" style="display:none;">
      <button id="zoomOutBtn">－</button>
      <span id="zoomLabel">100%</span>
      <button id="zoomInBtn">＋</button>
    </div>
    <span id="errorText" style="margin-left:8px;"></span>
  </div>

  <div id="mainLayout">
    <div id="timelinePane">
      <div id="zoomWrapper">
        <div id="loadingMsg">読み込み中...</div>
        <table id="calTable" style="display:none;">
          <thead id="calHead"></thead>
          <tbody id="calBody"></tbody>
        </table>
      </div>
    </div>
    <div id="checklistPane">
      <div id="checklistContent" style="display:none;"></div>
    </div>
  </div>

<script>
(() => {
  'use strict';

  const TZ = 'Asia/Tokyo';
  const WEEKDAYS = ['日','月','火','水','木','金','土'];

  const prevMonthBtn     = document.getElementById('prevMonthBtn');
  const nextMonthBtn     = document.getElementById('nextMonthBtn');
  const rangeLabel       = document.getElementById('rangeLabel');
  const calHead          = document.getElementById('calHead');
  const calBody          = document.getElementById('calBody');
  const calTable         = document.getElementById('calTable');
  const loadingMsg       = document.getElementById('loadingMsg');
  const errorText        = document.getElementById('errorText');
  const checklistPane    = document.getElementById('checklistPane');
  const checklistContent = document.getElementById('checklistContent');
  const zoomWrapper      = document.getElementById('zoomWrapper');
  const zoomLabel        = document.getElementById('zoomLabel');
  const zoomInBtn        = document.getElementById('zoomInBtn');
  const zoomOutBtn       = document.getElementById('zoomOutBtn');
  const timelinePane     = document.getElementById('timelinePane');

  // 表示開始オフセット（◀▶で±30日移動）
  let offsetDays = 0;

  // ズーム機能無効化（CSS変数でサイズ制御・stickyを維持）
  function applyZoom() {
    const calTable = document.getElementById('calTable');
    if (!calTable) return;
    const isMobile = window.innerWidth <= 900;
    calTable.style.setProperty('--cell-w', isMobile ? '60px' : '80px');
    calTable.style.setProperty('--cell-fs', isMobile ? '9px'  : '11px');
  }
  if (zoomInBtn)  { zoomInBtn.disabled  = true; }
  if (zoomOutBtn) { zoomOutBtn.disabled = true;  }

  function pad2(n) { return String(n).padStart(2,'0'); }

  function toJstDateStr(isoStr) {
    if (!isoStr) return null;
    const d = new Date(isoStr);
    return new Intl.DateTimeFormat('en-CA', { timeZone: TZ, year:'numeric', month:'2-digit', day:'2-digit' }).format(d);
  }

  function todayJst() { return toJstDateStr(new Date().toISOString()); }

  // 当日+offsetDaysから62日間（約2ヶ月）の日付配列を生成
  function getDaysInRange() {
    const days = [];
    const start = addDays(todayJst(), offsetDays - 14);
    for (let i = 0; i < 76; i++) days.push(addDays(start, i));
    return days;
  }

  function updateRangeLabel(days) {
    if (!days.length) return;
    const s = days[0].split('-').map(Number);
    const e = days[days.length-1].split('-').map(Number);
    rangeLabel.textContent = `${s[0]}/${String(s[1]).padStart(2,'0')}/${String(s[2]).padStart(2,'0')} 〜 ${e[0]}/${String(e[1]).padStart(2,'0')}/${String(e[2]).padStart(2,'0')}`;
  }

  function getWeekday(dateStr) {
    const [y, m, d] = dateStr.split('-').map(Number);
    return new Date(Date.UTC(y, m-1, d)).getUTCDay();
  }

  function addDays(dateStr, n) {
    const [y, m, d] = dateStr.split('-').map(Number);
    const dt = new Date(Date.UTC(y, m-1, d));
    dt.setUTCDate(dt.getUTCDate() + n);
    return `${dt.getUTCFullYear()}-${pad2(dt.getUTCMonth()+1)}-${pad2(dt.getUTCDate())}`;
  }

  function compareDates(a, b) { return a < b ? -1 : a > b ? 1 : 0; }

  function lightenColor(hex, amount) {
    const num = parseInt(hex.replace('#', ''), 16);
    const r = Math.min(255, (num >> 16) + amount);
    const g = Math.min(255, ((num >> 8) & 0xff) + amount);
    const b = Math.min(255, (num & 0xff) + amount);
    return `rgb(${r},${g},${b})`;
  }

  function applyColor(block, color, isLight) {
    if (!color) return;
    const bg = isLight ? lightenColor(color, 80) : lightenColor(color, 60);
    block.style.cssText += `background:${bg} !important; border:2px solid ${color} !important; color:#333 !important; text-shadow:-1px -1px 0 #fff,1px -1px 0 #fff,-1px 1px 0 #fff,1px 1px 0 #fff;`;
  }

  async function fetchProjects() {
    const token = localStorage.getItem('token') || '';
    const res = await fetch('/api/projects/shipping', {
      headers: { Accept: 'application/json', Authorization: `Bearer ${token}` }
    });
    const json = await res.json();
    if (!res.ok) throw new Error(json.error || `HTTP ${res.status}`);
    return Array.isArray(json) ? json : json.projects || [];
  }

  const FIXED_ITEMS = [
    '表示板セット', '養生テープ', 'ガムテープ（黒）', 'キャプタイヤ',
    '電源タップ', 'アッテネーター（20db/40db）', '変換プラグ（オス-オス/メス-メス）',
  ];

  async function fetchChecklist(projectId) {
    const token = localStorage.getItem('token') || '';
    const res = await fetch(`/api/project-items/detail?project_id=${projectId}`, {
      headers: { Accept: 'application/json', Authorization: `Bearer ${token}` }
    });
    const dbItems = res.ok ? (await res.json()).items || [] : [];
    const fixedItems = FIXED_ITEMS.map(name => ({
      id: null, name, equipment_name: name, quantity: null,
      checked: false, fixed: true, image_url: null,
    }));
    return [...dbItems, ...fixedItems];
  }

  async function toggleCheckItem(projectId, itemId, checked) {
    const token = localStorage.getItem('token') || '';
    await fetch(`/api/project-items/${itemId}/check`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ checked })
    });
  }

  function buildTable(projects, days) {
    const today  = todayJst();
    const daySet = new Set(days);
    const dayIdx = Object.fromEntries(days.map((d, i) => [d, i]));

    calHead.innerHTML = '';
    const trH = document.createElement('tr');
    const thP = document.createElement('th');
    thP.className = 'th-project';
    thP.textContent = '案件';
    trH.appendChild(thP);
    for (const day of days) {
      const th = document.createElement('th');
      const w = getWeekday(day);
      const d = Number(day.split('-')[2]);
      th.textContent = `${d}\n${WEEKDAYS[w]}`;
      th.style.whiteSpace = 'pre';
      if (w === 6) th.classList.add('is-sat');
      if (w === 0) th.classList.add('is-sun');
      if (day === today) th.classList.add('is-today');
      trH.appendChild(th);
    }
    calHead.appendChild(trH);

    calBody.innerHTML = '';

    const visibleProjects = projects.filter(p => {
      const eventStart = toJstDateStr(p.usage_start_at || p.usage_start);
      const eventEnd   = toJstDateStr(p.usage_end_at   || p.usage_end);
      const shipDate   = p.shipping_date   ? p.shipping_date.slice(0,10)   : null;
      const retDate    = p.return_due_date ? p.return_due_date.slice(0,10) : null;
      const rangeStart = shipDate  || eventStart;
      const rangeEnd   = retDate   || eventEnd;
      if (!rangeStart || !rangeEnd) return false;
      // ★ 当月と重なるもののみ表示
      return compareDates(rangeStart, days[days.length-1]) <= 0 &&
             compareDates(rangeEnd,   days[0]) >= 0;
    });

    // 発送日が早い順にソート
    visibleProjects.sort((a, b) => {
      const as = a.shipping_date ? a.shipping_date.slice(0,10) : (toJstDateStr(a.usage_start_at || a.usage_start) || '9999');
      const bs = b.shipping_date ? b.shipping_date.slice(0,10) : (toJstDateStr(b.usage_start_at || b.usage_start) || '9999');
      return as < bs ? -1 : as > bs ? 1 : 0;
    });

    if (!visibleProjects.length) {
      const tr = document.createElement('tr');
      const td = document.createElement('td');
      td.colSpan = days.length + 1;
      td.textContent = 'この期間に案件はありません';
      td.style.cssText = 'text-align:center;padding:24px;color:#9ca3af;font-size:13px;';
      tr.appendChild(td);
      calBody.appendChild(tr);
      return;
    }

    for (const p of visibleProjects) {
      const status     = p.status || 'draft';
      const eventStart = toJstDateStr(p.usage_start_at || p.usage_start);
      const eventEnd   = toJstDateStr(p.usage_end_at   || p.usage_end);
      const shipDate   = p.shipping_date   ? p.shipping_date.slice(0,10)   : null;
      const retDate    = p.return_due_date ? p.return_due_date.slice(0,10) : null;

      let startTime = '', endTime = '';
      if (p.usage_start_at || p.usage_start) {
        const d = new Date(p.usage_start_at || p.usage_start);
        startTime = new Intl.DateTimeFormat('ja-JP', { timeZone: TZ, hour:'2-digit', minute:'2-digit', hour12: false }).format(d);
      }
      if (p.usage_end_at || p.usage_end) {
        const d = new Date(p.usage_end_at || p.usage_end);
        endTime = new Intl.DateTimeFormat('ja-JP', { timeZone: TZ, hour:'2-digit', minute:'2-digit', hour12: false }).format(d);
      }

      const row = document.createElement('tr');
      const tdP = document.createElement('td');
      tdP.className = 'td-project';
      tdP.textContent = p.title || '(無題)';
      tdP.title = p.title || '';
      tdP.addEventListener('click', () => openChecklist(p));
      row.appendChild(tdP);

      // ★ 月をまたぐ場合の当月内有効開始日を計算
      function effectiveStart(dateStr) {
        if (!dateStr) return null;
        return compareDates(dateStr, days[0]) >= 0 ? dateStr : days[0];
      }

      const effShipStart  = shipDate  ? effectiveStart(shipDate)  : null;
      const effEventStart = eventStart ? effectiveStart(eventStart) : null;
      const retStartDay   = eventEnd   ? addDays(eventEnd, 1)       : null;
      const effRetStart   = retStartDay ? effectiveStart(retStartDay) : null;

      // スキップセット
      const skipSet = new Set();

      function makeBlock(cls, text, title, isLight, onclick) {
        const block = document.createElement('div');
        block.className = `block ${status} ${cls}`;
        applyColor(block, p.color, isLight);
        block.textContent = text;
        block.title = title;
        block.addEventListener('mouseup', ev => {
          if (ev.button !== 0) return;
          if (dragMoved) return;
          onclick();
        });
        return block;
      }

      for (const day of days) {
        if (skipSet.has(day)) continue;

        const td = document.createElement('td');
        td.className = 'td-day';
        const w = getWeekday(day);
        if (w === 6) td.classList.add('is-sat');
        if (w === 0) td.classList.add('is-sun');
        if (day === today) td.classList.add('is-today');

        // 発送ブロック（当月内 shipDate〜eventStart前日）
        if (effShipStart && day === effShipStart && eventStart && compareDates(effShipStart, eventStart) < 0) {
          let span = 0, d = day;
          while (compareDates(d, eventStart) < 0 && daySet.has(d)) {
            span++; skipSet.add(d); d = addDays(d, 1);
          }
          if (span > 0) {
            td.colSpan = span;
            const block = document.createElement('div');
            block.className = `block light`;
            block.style.cssText = `background:#fff !important; border:2px solid ${p.color || '#e5e7eb'} !important; border-radius:6px; display:flex; align-items:center; gap:4px; padding:2px 6px; cursor:pointer;`;
            block.innerHTML = `<span style="color:#ef4444;font-weight:bold;font-size:10px;white-space:nowrap;">【発送】</span><span style="color:#333;font-size:10px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.title || ''}</span>`;
            block.title = `発送〜本番: ${p.title}`;
            block.addEventListener('mouseup', ev => { if (ev.button !== 0) return; if (dragMoved) return; openChecklist(p); });
            td.appendChild(block);
            row.appendChild(td);
            continue;
          }
        }

        // 本番ブロック（当月内 eventStart〜eventEnd）
        if (effEventStart && day === effEventStart && eventEnd) {
          let span = 0, d = day;
          while (compareDates(d, eventEnd) <= 0 && daySet.has(d)) {
            span++; skipSet.add(d); d = addDays(d, 1);
          }
          span = Math.max(1, span);
          td.colSpan = span;
          const label = `🎬 ${p.title || ''} ${startTime}〜${endTime}`;
          const block = makeBlock('event-day', label, `本番日: ${p.title}`, false, () => openChecklist(p));
          td.appendChild(block);
          row.appendChild(td);
          continue;
        }

        // 返却ブロック（当月内 retStartDay〜retDate）
        if (effRetStart && day === effRetStart && retDate) {
          let span = 0, d = day;
          while (compareDates(d, retDate) <= 0 && daySet.has(d)) {
            span++; skipSet.add(d); d = addDays(d, 1);
          }
          if (span > 0) {
            td.colSpan = span;
            const block = document.createElement('div');
            block.className = `block light`;
            block.style.cssText = `background:#fff !important; border:2px solid ${p.color || '#e5e7eb'} !important; border-radius:6px; display:flex; align-items:center; gap:4px; padding:2px 6px; cursor:pointer;`;
            block.innerHTML = `<span style="color:#ef4444;font-weight:bold;font-size:10px;white-space:nowrap;">【返却】</span><span style="color:#333;font-size:10px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.title || ''}</span>`;
            block.title = `返却期間: ${p.title}`;
            block.addEventListener('mouseup', ev => { if (ev.button !== 0) return; if (dragMoved) return; openChecklist(p); });
            td.appendChild(block);
            row.appendChild(td);
            continue;
          }
        }

        row.appendChild(td);
      }

      calBody.appendChild(row);
    }
  }

  async function openChecklist(project) {
    checklistPane.classList.add('open');
    checklistContent.style.display = 'block';
    checklistContent.innerHTML = `<h2>${project.title || '(無題)'}</h2><div class="meta">読み込み中...</div>`;
    try {
      const items  = await fetchChecklist(project.id);
      const status = { draft: '仮', confirmed: '確定', cancelled: 'キャンセル' }[project.status] || '';

      let html = `
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
          <button onclick="location.href='/project-edit.html?id=${project.id}&return=${encodeURIComponent(location.pathname)}'"
            style="flex:1;padding:6px 0;background:#fff;color:#2563eb;border:2px solid #2563eb;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;">
            ✏️ 案件編集
          </button>
          <button id="deleteProjectBtn"
            style="flex:1;padding:6px 0;background:#fff;color:#ef4444;border:2px solid #ef4444;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;">
            🗑️ 案件削除
          </button>
          <button id="closeChecklistBtn" style="background:none;border:none;font-size:18px;cursor:pointer;color:#6b7280;padding:0 4px;">✕</button>
        </div>
        <h2 style="margin:0 0 4px;font-size:15px;">${project.title || '(無題)'}</h2>
        <div class="meta" style="margin-bottom:12px;"><span>${status}</span></div>
      `;

      const dbItems    = items.filter(i => !i.fixed);
      const fixedItems = items.filter(i => i.fixed);

      if (!items.length) {
        html += `<div style="color:#9ca3af;font-size:13px;margin-top:16px;">チェックリストアイテムがありません</div>`;
      } else {
        if (dbItems.length) {
          html += `<div style="font-size:11px;font-weight:700;color:#6b7280;padding:6px 0 4px;border-bottom:1px solid #e5e7eb;margin-bottom:4px;">📦 案件機材</div>`;
          for (const item of dbItems) {
            const checked   = item.checked ? 'checked' : '';
            const nameClass = item.checked ? 'item-name checked' : 'item-name';
            const img = item.image_url ? `<img src="${item.image_url}" alt="">` : '';
            const qty = item.quantity ? `<span style="font-size:11px;color:#6b7280;white-space:nowrap;">${item.quantity}個</span>` : '';
            html += `
              <div class="cl-item">
                <input type="checkbox" ${checked} data-item-id="${item.id}" data-project-id="${project.id}" />
                ${img}
                <span class="${nameClass}">${item.name || item.equipment_name || ''}</span>
                ${qty}
              </div>`;
          }
        }
        if (fixedItems.length) {
          html += `<div style="font-size:11px;font-weight:700;color:#6b7280;padding:6px 0 4px;border-bottom:1px solid #e5e7eb;margin-bottom:4px;margin-top:8px;">🔧 固定備品</div>`;
          for (const item of fixedItems) {
            html += `
              <div class="cl-item">
                <span style="width:16px;height:16px;display:inline-block;border:2px solid #d1d5db;border-radius:4px;flex-shrink:0;"></span>
                <span class="item-name">${item.equipment_name}</span>
                <span style="font-size:11px;color:#9ca3af;white-space:nowrap;">固定備品</span>
              </div>`;
          }
        }
      }

      
      checklistContent.innerHTML = html;

      document.getElementById('closeChecklistBtn').addEventListener('click', () => {
        checklistPane.classList.remove('open');
        checklistContent.style.display = 'none';
      });

      document.getElementById('deleteProjectBtn').addEventListener('click', () => deleteProject(project.id));

      checklistContent.querySelectorAll('input[type=checkbox]').forEach(cb => {
        cb.addEventListener('change', async () => {
          const span = cb.parentElement.querySelector('.item-name');
          cb.checked ? span.classList.add('checked') : span.classList.remove('checked');
          await toggleCheckItem(cb.dataset.projectId, cb.dataset.itemId, cb.checked);
        });
      });
    } catch (e) {
      checklistContent.innerHTML = `<div style="color:#b91c1c;">チェックリストの取得に失敗しました</div>`;
    }
  }

  async function deleteProject(projectId) {
    if (!confirm('この案件を発送確認カレンダーから非表示にしますか？\n（他のカレンダーには影響しません）')) return;
    try {
      const token = localStorage.getItem('token') || '';
      const res = await fetch(`/api/projects/${projectId}/hide-shipping`, {
        method: 'DELETE',
        headers: { Authorization: `Bearer ${token}` }
      });
      if (!res.ok) throw new Error('削除失敗');
      checklistPane.classList.remove('open');
      checklistContent.style.display = 'none';
      await render();
    } catch (e) {
      alert('削除に失敗しました: ' + e.message);
    }
  }

  async function render() {
    errorText.textContent = '';
    loadingMsg.style.display = 'block';
    calTable.style.display = 'none';
    try {
      const days     = getDaysInRange();
      updateRangeLabel(days);
      const projects = await fetchProjects();
      buildTable(projects, days);
      loadingMsg.style.display = 'none';
      calTable.style.display = '';
      const todayCol = calHead.querySelector('th.is-today');
      if (todayCol) {
        const projectColWidth = 160;
        timelinePane.scrollLeft = todayCol.offsetLeft - projectColWidth;
      }
    } catch(e) {
      loadingMsg.textContent = 'エラーが発生しました';
      errorText.textContent = e.message;
    }
  }

  // ドラッグスクロール
  let isDragging = false;
  let dragStartX = 0, dragStartY = 0;
  let dragScrollLeft = 0, dragScrollTop = 0;
  let dragMoved = false;
  timelinePane.style.userSelect = 'none';
  timelinePane.addEventListener('mousedown', ev => {
    if (ev.button !== 0) return;
    isDragging = true;
    dragMoved = false;
    dragStartX = ev.clientX;
    dragStartY = ev.clientY;
    dragScrollLeft = timelinePane.scrollLeft;
    dragScrollTop  = timelinePane.scrollTop;
    timelinePane.style.cursor = 'grabbing';
  });
  document.addEventListener('mousemove', ev => {
    if (!isDragging) return;
    const dx = ev.clientX - dragStartX;
    const dy = ev.clientY - dragStartY;
    if (Math.abs(dx) > 4 || Math.abs(dy) > 4) dragMoved = true;
    timelinePane.scrollLeft = dragScrollLeft - dx;
    timelinePane.scrollTop  = dragScrollTop  - dy;
  });
  document.addEventListener('mouseup', () => {
    isDragging = false;
    timelinePane.style.cursor = '';
    setTimeout(() => { dragMoved = false; }, 0);
  });

  // ◀▶ボタンで表示期間を±30日移動
  prevMonthBtn.addEventListener('click', () => { offsetDays -= 30; render(); });
  nextMonthBtn.addEventListener('click', () => { offsetDays += 30; render(); });

  applyZoom();
  render();
})();
</script>

  <script>
    // 右タブ スワイプで閉じる（スマホ対応）
    (function() {
      function addSwipeToClose(paneId, closeClass) {
        const pane = document.getElementById(paneId);
        if (!pane) return;
        let startX = 0, startY = 0;
        pane.addEventListener('touchstart', function(e) {
          startX = e.touches[0].clientX;
          startY = e.touches[0].clientY;
        }, { passive: true });
        pane.addEventListener('touchend', function(e) {
          const dx = e.changedTouches[0].clientX - startX;
          const dy = Math.abs(e.changedTouches[0].clientY - startY);
          // 右方向に50px以上スワイプ、縦ズレ30px以内
          if (dx > 50 && dy < 30) {
            pane.classList.remove('open');
            if (closeClass) closeClass();
          }
        }, { passive: true });
      }
      // DOMロード後に実行
      document.addEventListener('DOMContentLoaded', function() {
        addSwipeToClose('checklistPane', function() {
          const content = document.getElementById('checklistContent');
          if (content) content.style.display = 'none';
        });
      });
    })();
  </script>
